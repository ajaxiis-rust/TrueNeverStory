<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueNeverStory — Worlds</title>


<link href="/static/fonts/fonts.css" rel="stylesheet">
<link href="/static/theme-dark.css" rel="stylesheet">
<link href="/static/theme-light.css" rel="stylesheet">
<link href="/static/theme-terminal.css" rel="stylesheet">
<link href="/static/theme-cyberpunk.css" rel="stylesheet">
<link href="/static/theme-custom.css" rel="stylesheet">
<link href="/static/theme.css" rel="stylesheet">
<script src="/static/theme.js"></script>
<style>
:root{--font-body:'Space Grotesk',system-ui,sans-serif;--font-mono:'Space Mono',monospace;--radius-md:8px;--radius-lg:12px;--radius-pill:999px;--ease-out:cubic-bezier(.22,.61,.36,1);--dur-fast:120ms;--dur-normal:200ms;--dur-slow:340ms}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:var(--black);overflow:hidden}
body{height:100%;background:var(--black);font-family:var(--font-mono);font-size:14px;color:var(--text-primary);display:flex;flex-direction:column;overflow:hidden;user-select:none}

.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:48px;border-bottom:1px solid var(--border);flex-shrink:0}
.topbar__brand{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-disabled)}
.topbar__brand span{color:var(--text-display);font-weight:700}
.topbar__sep{width:1px;height:18px;background:var(--border)}
.topbar__title{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary)}
.topbar__spacer{flex:1}
.topbar__btn{background:transparent;border:1px solid var(--border-visible);color:var(--text-tertiary);font-family:var(--font-mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:6px 16px;cursor:pointer;border-radius:var(--radius-pill);transition:all var(--dur-fast);text-decoration:none;display:inline-flex;align-items:center}
.topbar__btn:hover{border-color:var(--text-secondary);color:var(--text-primary)}
.topbar__btn--active{border-color:var(--interactive);color:var(--interactive)}

.content{flex:1;overflow-y:auto;padding:20px 24px}
.content::-webkit-scrollbar{width:2px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--border-visible);border-radius:2px}

.section{margin-bottom:20px}
.section__title{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-secondary);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section__title::after{content:'';flex:1;height:1px;background:var(--border)}

.world-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.world-card{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--dur-fast);position:relative}
.world-card:hover{border-color:var(--border-visible);background:var(--surface-hover)}
.world-card--active{border-color:var(--interactive)}
.world-card__header{display:flex;align-items:start;justify-content:space-between;margin-bottom:8px}
.world-card__name{font-family:var(--font-body);font-size:16px;color:var(--text-display);font-weight:500}
.world-card__genre{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-disabled);background:var(--surface);padding:2px 8px;border-radius:var(--radius-pill);border:1px solid var(--border)}
.world-card__desc{font-size:12px;color:var(--text-tertiary);line-height:1.4;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.world-card__meta{display:flex;gap:12px;font-size:11px;color:var(--text-disabled)}
.world-card__actions{display:flex;gap:6px;margin-top:12px}
.world-card__active{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--interactive);position:absolute;top:12px;right:12px}

/* Form */
.form{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;flex-direction:column;gap:10px}
.form__row{display:flex;gap:10px;align-items:end}
.form__field{display:flex;flex-direction:column;gap:3px;flex:1}
.form__field--full{flex:0 0 100%}
.form__label{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-disabled)}
.form__input,.form__textarea,.form__select{background:var(--surface);border:1px solid var(--border-visible);border-radius:var(--radius-md);padding:9px 12px;font-family:var(--font-mono);font-size:13px;color:var(--text-primary);outline:none;transition:border-color var(--dur-fast);width:100%}
.form__input:focus,.form__textarea:focus{border-color:var(--text-secondary)}
.form__input::placeholder,.form__textarea::placeholder{color:var(--text-disabled)}
.form__textarea{min-height:80px;resize:vertical;line-height:1.5;font-size:12px}
.form__select{appearance:none;cursor:pointer}
.form__check{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text-secondary)}
.form__check input{accent-color:var(--interactive)}
.form__tip{font-size:11px;color:var(--text-disabled);line-height:1.3;margin-top:2px;min-height:0;transition:color var(--dur-fast)}
.form__tip:not(:empty){color:var(--text-tertiary)}
.form__field:hover .form__tip{color:var(--interactive)}

.btn{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;padding:7px 16px;border-radius:var(--radius-pill);cursor:pointer;transition:all var(--dur-fast);border:1px solid var(--border-visible);background:transparent;color:var(--text-secondary)}
.btn:hover{border-color:var(--text-secondary);color:var(--text-primary)}
.btn--primary{background:var(--text-display);color:var(--black);border-color:var(--text-display)}
.btn--primary:hover{opacity:.9}
.btn--danger{border-color:var(--accent);color:var(--accent)}
.btn--danger:hover{background:var(--accent);color:var(--black)}
.btn--sm{padding:5px 12px;font-size:11px}
.btn--success{border-color:var(--success);color:var(--success)}
.btn--success:hover{background:var(--success);color:var(--black)}

.toast{position:fixed;bottom:20px;right:20px;padding:12px 24px;border-radius:var(--radius-md);font-family:var(--font-mono);font-size:13px;letter-spacing:.06em;z-index:100;animation:toastIn 200ms var(--ease-out)}
.toast--ok{background:var(--success);color:var(--black)}
.toast--err{background:var(--accent);color:var(--black)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;animation:fadeIn 150ms var(--ease-out)}
.modal-box{background:var(--surface-raised);border:1px solid var(--border-visible);border-radius:var(--radius-lg);width:560px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal-title{font-family:var(--font-mono);font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-secondary)}
.modal-close{background:transparent;border:none;color:var(--text-disabled);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:4px}
.modal-close:hover{color:var(--text-primary)}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px}

.empty{text-align:center;padding:40px;color:var(--text-disabled);font-size:13px}

.birth-wizard{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;animation:fadeIn 150ms var(--ease-out)}
.birth-wizard--open{display:flex}
.birth-wizard__box{background:var(--surface-raised);border:1px solid var(--border-visible);border-radius:var(--radius-lg);width:520px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.birth-wizard__head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.birth-wizard__title{font-family:var(--font-mono);font-size:14px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-display)}
.birth-wizard__close{background:transparent;border:none;color:var(--text-disabled);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px;line-height:1}
.birth-wizard__close:hover{color:var(--text-primary)}
.birth-wizard__body{flex:1;overflow-y:auto;padding:20px}
.birth-wizard__narrative{font-family:var(--font-body);font-size:14px;line-height:1.7;color:var(--text-primary);padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:16px;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.birth-wizard__info{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.birth-wizard__tag{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius-pill);color:var(--text-secondary)}
.birth-wizard__tag--accent{border-color:var(--accent);color:var(--accent)}
.birth-wizard__tag--success{border-color:var(--success);color:var(--success)}
.birth-wizard__tag--interactive{border-color:var(--interactive);color:var(--interactive)}
.birth-wizard__footer{display:flex;gap:8px;justify-content:flex-end;padding:16px 20px;border-top:1px solid var(--border)}
.birth-wizard__loading{text-align:center;padding:40px;color:var(--text-disabled);font-size:13px}
.birth-wizard__loading::after{content:'';display:block;width:20px;height:20px;border:2px solid var(--border-visible);border-top-color:var(--text-secondary);border-radius:50%;animation:spin .6s linear infinite;margin:12px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}

/* World Detail Modal */
.detail-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;animation:fadeIn 150ms var(--ease-out)}
.detail-modal--open{display:flex}
.detail-modal__box{background:var(--surface-raised);border:1px solid var(--border-visible);border-radius:var(--radius-lg);width:640px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.detail-modal__head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.detail-modal__title{font-family:var(--font-mono);font-size:14px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-display)}
.detail-modal__close{background:transparent;border:none;color:var(--text-disabled);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:4px}
.detail-modal__close:hover{color:var(--text-primary)}
.detail-modal__body{flex:1;overflow-y:auto;padding:16px 20px}
.detail-modal__section{margin-bottom:16px}
.detail-modal__section-title{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-secondary);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.detail-modal__section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.detail-modal__stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.detail-modal__stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 12px;text-align:center}
.detail-modal__stat-val{font-family:var(--font-body);font-size:22px;color:var(--text-display);font-weight:600}
.detail-modal__stat-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-disabled);margin-top:2px}
.detail-modal__entity-list{display:flex;flex-direction:column;gap:6px}
.detail-modal__entity{display:flex;align-items:start;gap:10px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);transition:border-color var(--dur-fast)}
.detail-modal__entity:hover{border-color:var(--border-visible)}
.detail-modal__entity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.detail-modal__entity-dot--char{background:var(--interactive)}
.detail-modal__entity-dot--loc{background:var(--success)}
.detail-modal__entity-dot--faction{background:var(--accent)}
.detail-modal__entity-dot--item{background:var(--warning)}
.detail-modal__entity-info{flex:1;min-width:0}
.detail-modal__entity-name{font-family:var(--font-body);font-size:13px;color:var(--text-display);font-weight:500}
.detail-modal__entity-summary{font-size:11px;color:var(--text-tertiary);line-height:1.4;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.detail-modal__entity-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.detail-modal__entity-tag{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:1px 6px;border:1px solid var(--border);border-radius:var(--radius-pill);color:var(--text-disabled)}
.detail-modal__rule{padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-secondary)}
.detail-modal__rule:last-child{border-bottom:none}
.detail-modal__rule-name{color:var(--text-display);font-weight:500}
.detail-modal__rule-desc{color:var(--text-tertiary);font-size:11px;margin-top:2px}
.detail-modal__empty{text-align:center;padding:24px;color:var(--text-disabled);font-size:12px}
@media(max-width:768px){.detail-modal__box{width:calc(100vw - 32px)}}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.toggle{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle__track{width:36px;height:20px;background:var(--border-visible);border-radius:10px;position:relative;transition:background var(--dur-fast)}
.toggle--on .toggle__track{background:var(--interactive)}
.toggle__thumb{width:16px;height:16px;background:var(--text-display);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform var(--dur-fast)}
.toggle--on .toggle__thumb{transform:translateX(16px)}
.toggle__label{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)}

@media(max-width:768px){.world-grid{grid-template-columns:1fr}.topbar__btn{padding:5px 10px;font-size:11px}.birth-wizard__box{width:calc(100vw - 32px)}}
@media(max-width:480px){.topbar__brand span{display:none}.form__row{flex-direction:column}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar__brand"><span>TrueNeverStory</span></div>
  <div class="topbar__sep"></div>
  <div class="topbar__title" data-i18n="uiWorlds">Worlds</div>
  <div class="topbar__spacer"></div>
  <a href="/providers" class="topbar__btn" data-i18n="uiProviders">PROVIDERS</a>
  <a href="/models" class="topbar__btn" data-i18n="uiModels">MODELS</a>
  <a href="/agents" class="topbar__btn" data-i18n="uiAgents">AGENTS</a>
  <a href="/settings" class="topbar__btn" data-i18n="uiConfig">CONFIG</a>
  <a href="/" class="topbar__btn" data-i18n="uiBack">BACK</a>
</div>

<div class="content" id="content">
  <div class="section">
    <div class="section__title" data-i18n="uiYourWorlds">Your Worlds</div>
    <div id="worldGrid" class="world-grid"><div class="empty" data-i18n="uiLoading">Loading...</div></div>
  </div>

  <div class="section">
    <div class="section__title" data-i18n="uiCreateWorld">Create New World</div>
    <div class="form" id="createForm">
      <div class="form__row">
        <div class="form__field">
          <label class="form__label" data-i18n="uiWorldName">World Name</label>
          <input class="form__input" id="fName" placeholder="dark-realm, starwars (Latin only, auto-transliterated)" oninput="transliterateSlug(this)">
          <span class="form__tip" data-i18n-tip="tipWorldName"></span>
        </div>
        <div class="form__field">
          <label class="form__label" data-i18n="uiTitle">Title</label>
          <input class="form__input" id="fTitle" placeholder="The Dark Realm">
          <span class="form__tip" data-i18n-tip="tipTitle"></span>
        </div>
      </div>
      <div class="form__field form__field--full">
        <label class="form__label" data-i18n="uiDescription">Description</label>
        <textarea class="form__textarea" id="fDesc" placeholder="A world of eternal twilight where ancient magic..."></textarea>
        <span class="form__tip" data-i18n-tip="tipDescription"></span>
      </div>
      <div class="form__field form__field--full">
        <label class="form__label" data-i18n="uiGenre">Genres</label>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
          <label class="form__check"><input type="checkbox" class="fGenre" value="fantasy"> <span data-i18n="uiGenreFantasy">Fantasy</span></label>
          <label class="form__check"><input type="checkbox" class="fGenre" value="scifi"> <span data-i18n="uiGenreScifi">Sci-Fi</span></label>
          <label class="form__check"><input type="checkbox" class="fGenre" value="fiction"> <span data-i18n="uiGenreFiction">Fiction</span></label>
          <label class="form__check"><input type="checkbox" class="fGenre" value="litrpg"> <span data-i18n="uiGenreLitRPG">LitRPG</span></label>
          <label class="form__check"><input type="checkbox" class="fGenre" value="horror"> <span data-i18n="uiGenreHorror">Horror</span></label>
          <label class="form__check"><input type="checkbox" class="fGenre" value="post-apocalyptic"> <span data-i18n="uiGenrePostapoc">Post-Apocalyptic</span></label>
          <label class="form__check"><input type="checkbox" class="fGenre" value="historical"> <span data-i18n="uiGenreHistorical">Historical</span></label>
          <label class="form__check"><input type="checkbox" class="fGenre" value="cyberpunk"> <span data-i18n="uiGenreCyberpunk">Cyberpunk</span></label>
          <label class="form__check"><input type="checkbox" class="fGenre" value="steampunk"> <span data-i18n="uiGenreSteampunk">Steampunk</span></label>
          <label class="form__check"><input type="checkbox" class="fGenre" value="mythology"> <span data-i18n="uiGenreMythology">Mythology</span></label>
        </div>
        <span class="form__tip" data-i18n-tip="tipGenre"></span>
      </div>
      <div class="form__field form__field--full">
        <label class="form__label" data-i18n="uiLanguage">Language</label>
        <select class="form__select" id="fLang">
          <option value="en">English</option>
          <option value="ru">Русский</option>
          <option value="de">Deutsch</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
        </select>
        <span class="form__tip" data-i18n-tip="tipLanguage"></span>
      </div>
      <div class="form__field form__field--full">
        <label class="form__label" data-i18n="uiWorldRules">World Rules (one per line)</label>
        <textarea class="form__textarea" id="fRules" placeholder="Magic requires blood sacrifice&#10;The dead cannot be resurrected&#10;Dragons are extinct"></textarea>
        <span class="form__tip" data-i18n-tip="tipWorldRules"></span>
      </div>
      <div class="form__field form__field--full">
        <label class="form__label" data-i18n="uiSocialSystem">Social System</label>
        <select class="form__select" id="fSocial">
          <option value="" data-i18n="uiSocialNone">— None —</option>
          <option value="feudalism" data-i18n="uiSocialFeudalism">Feudalism</option>
          <option value="democracy" data-i18n="uiSocialDemocracy">Democracy</option>
          <option value="anarchy" data-i18n="uiSocialAnarchy">Anarchy</option>
          <option value="theocracy" data-i18n="uiSocialTheocracy">Theocracy</option>
          <option value="communism" data-i18n="uiSocialCommunism">Communism</option>
          <option value="capitalism" data-i18n="uiSocialCapitalism">Capitalism</option>
          <option value="socialism" data-i18n="uiSocialSocialism">Socialism</option>
          <option value="tribalism" data-i18n="uiSocialTribalism">Tribalism</option>
          <option value="slavery" data-i18n="uiSocialSlavery">Slavery</option>
          <option value="mercantilism" data-i18n="uiSocialMercantilism">Mercantilism</option>
        </select>
        <span class="form__tip" data-i18n-tip="tipSocialSystem"></span>
      </div>
      <div class="form__field form__field--full">
        <label class="form__label" data-i18n="uiEconomyModifiers">Economy Modifiers</label>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px">
          <label class="form__check"><input type="checkbox" id="fEcoGold" value="gold-standard"> Gold Standard</label>
          <label class="form__check"><input type="checkbox" id="fEcoSilver" value="silver-economy"> Silver Economy</label>
          <label class="form__check"><input type="checkbox" id="fEcoBarter" value="barter"> Barter</label>
          <label class="form__check"><input type="checkbox" id="fEcoCommand" value="command-economy"> Command Economy</label>
        </div>
        <span class="form__tip" data-i18n-tip="tipEconomy"></span>
      </div>
      <div class="form__field form__field--full">
        <label class="form__label" data-i18n="uiMagicSystem">Magic System (optional)</label>
        <textarea class="form__textarea" id="fMagic" placeholder="Elemental magic drawn from ley lines..."></textarea>
        <span class="form__tip" data-i18n-tip="tipMagic"></span>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="resetForm()" data-i18n="uiClear">CLEAR</button>
        <button class="btn btn--primary" onclick="createWorld()" data-i18n="uiCreateWorldBtn">CREATE WORLD</button>
      </div>
    </div>
  </div>
</div>

<div class="birth-wizard" id="birthWizard">
  <div class="birth-wizard__box">
    <div class="birth-wizard__head">
      <span class="birth-wizard__title" data-i18n="uiBirthWizard">Birth Wizard</span>
      <button class="birth-wizard__close" onclick="closeBirthWizard()">&times;</button>
    </div>
    <div class="birth-wizard__body" id="birthWizardBody">
      <div class="form">
        <div class="form__field form__field--full">
          <label class="form__label" data-i18n="uiBirthHints">Character Hints (optional)</label>
          <textarea class="form__textarea" id="birthHints" data-i18n-placeholder="uiBirthHintsPlaceholder" placeholder="e.g. female elf, mage, noble family, name: Aria...&#10;Leave empty for random generation"></textarea>
        </div>
        <div class="form__row">
          <div class="form__field">
            <label class="form__label" data-i18n="uiStartingAge">Starting Age</label>

function applyLang(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (lang[k]) el.textContent = lang[k];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const k = el.getAttribute('data-i18n-placeholder');
    if (lang[k]) el.placeholder = lang[k];
  });
  document.querySelectorAll('[data-i18n-tip]').forEach(el => {
    const k = el.getAttribute('data-i18n-tip');
    if (lang[k]) el.textContent = lang[k];
  });
}

async function loadLang() {
  try {
    const r = await fetch(API + '/settings', { credentials: 'include' });
    const s = await r.json();
    window._lang = I18N[s.language] || I18N.en;
  } catch { window._lang = I18N.en; }
  applyLang(window._lang);
}

function t(key) { return (window._lang && window._lang[key]) || I18N.en[key] || key; }

async function apiFetch(path, opts) {
  const res = await fetch(API + path, { credentials: 'include', ...opts });
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || res.statusText);
  return res.json();
}

function toast(msg, ok) {
  const el = document.createElement('div');
  el.className = 'toast toast--' + (ok ? 'ok' : 'err');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

let activeWorld = 'default';

async function loadWorlds() {
  try {
    const data = await apiFetch('/worlds');
    activeWorld = data.active;
    const grid = document.getElementById('worldGrid');
    if (!data.worlds || data.worlds.length === 0) {
      grid.innerHTML = '<div class="empty">' + t('uiNoWorlds') + '</div>';
      return;
    }
    grid.innerHTML = data.worlds.map(w => `
      <div class="world-card ${w.name === activeWorld ? 'world-card--active' : ''}" onclick="openDetailModal('${w.name}', event)">
        ${w.name === activeWorld ? '<div class="world-card__active">' + t('uiActive') + '</div>' : ''}
        <div class="world-card__header">
          <div class="world-card__name">${esc(w.title || w.name)}</div>
          ${w.genre ? '<div class="world-card__genre">' + esc(w.genre) + '</div>' : ''}
        </div>
        ${w.description ? '<div class="world-card__desc">' + esc(w.description) + '</div>' : ''}
        <div class="world-card__meta">
          <span>${w.entityCount} ${t('uiEntities')}</span>
          <span>${w.sessionCount} ${t('uiSessions')}</span>
          <span>${esc(w.language)}</span>
        </div>
        <div class="world-card__actions">
          <button class="btn btn--sm btn--primary" onclick="event.stopPropagation();openBirthWizard('${esc(w.name)}')">${t('uiNewGame')}</button>
          ${w.name !== activeWorld ? '<button class="btn btn--sm btn--success" onclick="event.stopPropagation();switchWorld(\'' + esc(w.name) + '\')">' + t('uiSwitch') + '</button>' : ''}
          ${w.name !== activeWorld ? '<button class="btn btn--sm btn--danger" onclick="event.stopPropagation();deleteWorld(\'' + esc(w.name) + '\')">' + t('uiDelete') + '</button>' : ''}
        </div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('worldGrid').innerHTML = '<div class="empty">' + esc(e.message) + '</div>';
  }
}

function selectWorld(name) {
  switchWorld(name);
}

async function switchWorld(name) {
  try {
    await apiFetch('/worlds/' + name + '/switch', { method: 'POST' });
    activeWorld = name;
    toast('✓', true);
    loadWorlds();
  } catch (e) {
    toast(e.message, false);
  }
}

async function deleteWorld(name) {
  if (!confirm('Delete "' + name + '"?')) return;
  try {
    await apiFetch('/worlds/' + name, { method: 'DELETE' });
    toast('✓', true);
    loadWorlds();
  } catch (e) {
    toast(e.message, false);
  }
}

const TRANSLIT_MAP = {а:'a',б:'b',в:'v',г:'g',д:'d',е:'e',ё:'yo',ж:'zh',з:'z',и:'i',й:'y',к:'k',л:'l',м:'m',н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'kh',ц:'ts',ч:'ch',ш:'sh',щ:'shch',ъ:'',ы:'y',ь:'',э:'e',ю:'yu',я:'ya',ä:'ae',ö:'oe',ü:'ue',ñ:'n',é:'e',è:'e',ê:'e',à:'a',â:'a',ç:'c',ø:'o',å:'a',æ:'ae'};
function transliterateSlug(el) {
  let v = el.value;
  let out = '';
  for (const ch of v.toLowerCase()) {
    out += TRANSLIT_MAP[ch] ?? ch;
  }
  el.value = out.replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

async function createWorld() {
  let name = document.getElementById('fName').value.trim();
  if (!name) { toast(t('uiWorldName'), false); return; }

  // Auto-transliterate and validate Latin-only
  name = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  if (!name) { toast('Name must contain Latin letters or numbers', false); return; }
  document.getElementById('fName').value = name;

  const genres = [...document.querySelectorAll('.fGenre:checked')].map(c => c.value);
  if (!genres.length) genres.push('fantasy');

  const modifiers = [];
  if (document.getElementById('fEcoGold').checked) modifiers.push('gold-standard');
  if (document.getElementById('fEcoSilver').checked) modifiers.push('silver-economy');
  if (document.getElementById('fEcoBarter').checked) modifiers.push('barter');
  if (document.getElementById('fEcoCommand').checked) modifiers.push('command-economy');

  const body = {
    name,
    title: document.getElementById('fTitle').value.trim() || name,
    description: document.getElementById('fDesc').value.trim(),
    genres,
    language: document.getElementById('fLang')?.value || 'en',
    worldRules: document.getElementById('fRules').value.split('\n').filter(l => l.trim()),
    magicSystem: document.getElementById('fMagic').value.trim(),
    primaryRule: document.getElementById('fSocial').value || undefined,
    ruleModifiers: modifiers.length ? modifiers : undefined,
  };

  try {
    await apiFetch('/worlds', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    toast('✓', true);
    resetForm();
    loadWorlds();
  } catch (e) {
    toast(e.message, false);
  }
}

function resetForm() {
  document.getElementById('fName').value = '';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDesc').value = '';
  document.querySelectorAll('.fGenre').forEach(c => c.checked = false);
  document.getElementById('fRules').value = '';
  document.getElementById('fMagic').value = '';
  document.getElementById('fSocial').value = '';
  document.getElementById('fEcoGold').checked = false;
  document.getElementById('fEcoSilver').checked = false;
  document.getElementById('fEcoBarter').checked = false;
  document.getElementById('fEcoCommand').checked = false;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Birth Wizard ──
let birthWorldName = '';

function openBirthWizard(worldName) {
  birthWorldName = worldName;
  document.getElementById('birthWizard').classList.add('birth-wizard--open');
  const body = document.getElementById('birthWizardBody');
  const footer = document.getElementById('birthWizardFooter');
  body.innerHTML = `
    <div class="form">
      <div class="form__field form__field--full">
        <label class="form__label" data-i18n="uiBirthHints">Character Hints (optional)</label>
        <textarea class="form__textarea" id="birthHints" data-i18n-placeholder="uiBirthHintsPlaceholder" placeholder="e.g. female elf, mage, noble family, name: Aria...\nLeave empty for random generation"></textarea>
      </div>
      <div class="form__row">
        <div class="form__field">
          <label class="form__label" data-i18n="uiStartingAge">Starting Age</label>
          <input class="form__input" id="birthAge" type="number" min="0" max="100" value="5">
        </div>
        <div class="form__field" style="flex:0 0 auto">
          <label class="form__label" data-i18n="uiIsekaiMode">Isekai Mode</label>
          <div class="toggle" id="birthIsekai" onclick="this.classList.toggle('toggle--on')">
            <div class="toggle__track"><div class="toggle__thumb"></div></div>
            <span class="toggle__label" data-i18n="uiReincarnation">Reincarnation</span>
          </div>
        </div>
      </div>
    </div>`;
  footer.innerHTML = `<button class="btn btn--primary" id="birthStartBtn" onclick="startBirth()" data-i18n="uiStartNewLife">START NEW LIFE</button>`;
}

function closeBirthWizard() {
  document.getElementById('birthWizard').classList.remove('birth-wizard--open');
  birthWorldName = '';
}

async function startBirth() {
  const btn = document.getElementById('birthStartBtn');
  const body = document.getElementById('birthWizardBody');
  const footer = document.getElementById('birthWizardFooter');

  btn.disabled = true;
  btn.textContent = t('uiGenerating');

  const hints = document.getElementById('birthHints').value.trim();
  const isekai = document.getElementById('birthIsekai').classList.contains('toggle--on');
  const startingAge = parseInt(document.getElementById('birthAge').value) || 5;

  body.innerHTML = '<div class="birth-wizard__loading">' + t('uiCreating') + '</div>';
  footer.innerHTML = '';

  try {
    const res = await apiFetch('/launch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ hints, isekai, starting_age: startingAge }),
    });

    if (res.status === 'error') throw new Error(res.error || 'Launch failed');

    // Connect character to roleplay engine
    await apiFetch('/chat/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        character: res.character_name,
        location: res.initial_location || 'unknown',
        session_id: res.session_id,
      }),
    });

    // Show result
    body.innerHTML = `
      <div class="birth-wizard__info">
        <span class="birth-wizard__tag birth-wizard__tag--accent">${esc(res.character_name)}</span>
        <span class="birth-wizard__tag">${esc(res.race)}</span>
        <span class="birth-wizard__tag birth-wizard__tag--interactive">${esc(res.social_class)}</span>
        <span class="birth-wizard__tag birth-wizard__tag--success">${esc(res.birthplace)}</span>
      </div>
      <div class="birth-wizard__narrative">${esc(res.opening_narrative)}</div>
    `;
    footer.innerHTML = `
      <button class="btn" onclick="closeBirthWizard()">${t('uiClose')}</button>
      <a class="btn btn--primary" href="/" style="text-decoration:none">${t('uiPlayNow')}</a>
    `;
  } catch (e) {
    body.innerHTML = '<div class="birth-wizard__loading" style="color:var(--accent)">' + t('uiFailed') + ' ' + esc(e.message) + '</div>';
    footer.innerHTML = `
      <button class="btn" onclick="closeBirthWizard()">${t('uiClose')}</button>
      <button class="btn btn--primary" onclick="openBirthWizard('${esc(birthWorldName)}')">${t('uiRetry')}</button>
    `;
  }
}

// ── World Detail Modal ──
async function openDetailModal(worldName, e) {
  if (e) e.stopPropagation();
  const modal = document.getElementById('detailModal');
  const body = document.getElementById('detailModalBody');
  const title = document.getElementById('detailModalTitle');

  title.textContent = worldName;
  body.innerHTML = '<div class="detail-modal__empty">Loading...</div>';
  modal.classList.add('detail-modal--open');

  try {
    const data = await apiFetch('/worlds/' + worldName + '/detail');
    title.textContent = data.title || data.name;

    let html = '';

    // Stats grid
    html += '<div class="detail-modal__stats">';
    html += statBlock(data.totalEntities, t('uiEntities'));
    html += statBlock(data.entityCounts?.Character ?? 0, 'Characters');
    html += statBlock(data.entityCounts?.Location ?? 0, 'Locations');
    html += statBlock(data.entityCounts?.Faction ?? 0, 'Factions');
    html += statBlock(data.entityCounts?.Item ?? 0, 'Items');
    html += statBlock(data.entityCounts?.WorldRule ?? 0, 'Rules');
    html += statBlock(data.sessionCount, t('uiSessions'));
    html += statBlock(data.eventCount, 'Events');
    html += statBlock(data.chapterCount, 'Chapters');
    html += statBlock(data.villainCount, 'Villains');
    html += '</div>';

    // Description
    if (data.description) {
      html += '<div class="detail-modal__section">';
      html += '<div class="detail-modal__section-title">Description</div>';
      html += '<div style="font-size:12px;color:var(--text-secondary);line-height:1.6">' + esc(data.description) + '</div>';
      html += '</div>';
    }

    // World Rules
    if (data.worldRules && data.worldRules.length > 0) {
      html += '<div class="detail-modal__section">';
      html += '<div class="detail-modal__section-title">World Rules</div>';
      for (const rule of data.worldRules) {
        html += '<div class="detail-modal__rule"><span class="detail-modal__rule-name">' + esc(rule.name) + '</span>';
        if (rule.description) html += '<div class="detail-modal__rule-desc">' + esc(rule.description) + '</div>';
        html += '</div>';
      }
      html += '</div>';
    }

    // Characters
    if (data.characters && data.characters.length > 0) {
      html += '<div class="detail-modal__section">';
      html += '<div class="detail-modal__section-title">Characters (' + data.characters.length + ')</div>';
      html += '<div class="detail-modal__entity-list">';
      for (const c of data.characters) {
        html += entityCard(c.name, c.summary, c.tags, 'char');
      }
      html += '</div></div>';
    }

    // Locations
    if (data.locations && data.locations.length > 0) {
      html += '<div class="detail-modal__section">';
      html += '<div class="detail-modal__section-title">Locations (' + data.locations.length + ')</div>';
      html += '<div class="detail-modal__entity-list">';
      for (const l of data.locations) {
        html += entityCard(l.name, l.summary, [], 'loc');
      }
      html += '</div></div>';
    }

    // Factions
    if (data.factions && data.factions.length > 0) {
      html += '<div class="detail-modal__section">';
      html += '<div class="detail-modal__section-title">Factions (' + data.factions.length + ')</div>';
      html += '<div class="detail-modal__entity-list">';
      for (const f of data.factions) {
        html += entityCard(f.name, f.summary, [], 'faction');
      }
      html += '</div></div>';
    }

    // Items
    if (data.items && data.items.length > 0) {
      html += '<div class="detail-modal__section">';
      html += '<div class="detail-modal__section-title">Items (' + data.items.length + ')</div>';
      html += '<div class="detail-modal__entity-list">';
      for (const i of data.items) {
        html += entityCard(i.name, i.summary, [], 'item');
      }
      html += '</div></div>';
    }

    if (!html.includes('detail-modal__entity')) {
      html += '<div class="detail-modal__empty">No entities yet. Start a new game to populate the world.</div>';
    }

    body.innerHTML = html;
  } catch (e) {
    body.innerHTML = '<div class="detail-modal__empty" style="color:var(--accent)">' + esc(e.message) + '</div>';
  }
}

function closeDetailModal() {
  document.getElementById('detailModal').classList.remove('detail-modal--open');
}

function statBlock(val, label) {
  return '<div class="detail-modal__stat"><div class="detail-modal__stat-val">' + val + '</div><div class="detail-modal__stat-label">' + esc(label) + '</div></div>';
}

function entityCard(name, summary, tags, type) {
  let html = '<div class="detail-modal__entity">';
  html += '<span class="detail-modal__entity-dot detail-modal__entity-dot--' + type + '"></span>';
  html += '<div class="detail-modal__entity-info">';
  html += '<div class="detail-modal__entity-name">' + esc(name) + '</div>';
  if (summary) html += '<div class="detail-modal__entity-summary">' + esc(summary) + '</div>';
  if (tags && tags.length > 0) {
    html += '<div class="detail-modal__entity-tags">';
    for (const tag of tags.filter(Boolean)) {
      html += '<span class="detail-modal__entity-tag">' + esc(tag) + '</span>';
    }
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeDetailModal();
});

loadLang().then(() => loadWorlds());
