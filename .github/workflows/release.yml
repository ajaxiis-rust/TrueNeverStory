name: Build & Release (Bun + Mojo FFI)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BUN_VERSION: "latest"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target_bun: bun-linux-x64
            artifact: tns-linux-x64
            so_ext: ".so"

          - os: ubuntu-22.04-arm
            target_bun: bun-linux-arm64
            artifact: tns-linux-arm64
            so_ext: ".so"

          - os: macos-latest
            target_bun: bun-darwin-arm64
            artifact: tns-macos-arm64
            so_ext: ".dylib"

          - os: macos-latest
            target_bun: bun-darwin-x64
            artifact: tns-macos-x64
            so_ext: ".dylib"

          - os: windows-latest
            target_bun: bun-windows-x64
            artifact: tns-windows-x64
            so_ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run lint

      - name: Build Bun binary
        shell: bash
        run: |
          OUT="tns-server${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          if [[ "${{ runner.arch }}" == "X64" && "${{ matrix.target_bun }}" == *"arm64"* ]] || \
             [[ "${{ runner.arch }}" == "ARM64" && "${{ matrix.target_bun }}" == *"x64"* ]]; then
            echo "Cross-compiling: ${{ matrix.target_bun }}"
            bun build --compile --target "${{ matrix.target_bun }}" --outfile "$OUT" src/index.ts
          else
            echo "Native build"
            bun build --compile --outfile "$OUT" src/index.ts
          fi

      # === Mojo FFI (Linux + macOS only) ===
      - name: Install Mojo
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set +e  # Don't exit on error — Mojo install is optional

          # Method 1: magic CLI (no auth needed for latest)
          if ! command -v mojo &>/dev/null; then
            echo "Installing magic..."
            curl -L https://magic.modular.com | bash 2>/dev/null
            export PATH="$HOME/.modular/bin:$HOME/.local/bin:$PATH"

            if command -v magic &>/dev/null; then
              echo "Installing Mojo via magic..."
              magic install max 2>/dev/null || magic install mojo 2>/dev/null
            fi
          fi

          # Method 2: Check common install paths
          for p in \
            "$HOME/.modular/bin/mojo" \
            "$HOME/.local/bin/mojo" \
            "$HOME/.magic/bin/mojo" \
            "/usr/local/bin/mojo"; do
            if [[ -x "$p" ]]; then
              ln -sf "$p" /usr/local/bin/mojo 2>/dev/null || true
              break
            fi
          done

          # Verify
          if command -v mojo &>/dev/null; then
            echo "Mojo installed: $(mojo --version 2>&1 || echo 'unknown version')"
          else
            echo "::warning::Mojo not installed — will use TypeScript fallbacks"
          fi

      - name: Build Mojo Kernels
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if ! command -v mojo &>/dev/null; then
            echo "::warning::Skipping Mojo kernels — mojo compiler not available"
            exit 0
          fi

          echo "Mojo version: $(mojo --version 2>&1)"
          cd mojo

          SO_EXT="${{ matrix.so_ext }}"
          FAILED=0

          build_kernel() {
            local src="$1" name="$2"
            echo "Building ${name}${SO_EXT} from ${src}.mojo..."
            if mojo build --emit shared-lib -O3 \
              -o "../${name}${SO_EXT}" \
              "kernels/${src}.mojo" 2>&1; then
              echo "  ✓ ${name}${SO_EXT}"
            else
              echo "  ✗ Failed: ${name}${SO_EXT}"
              FAILED=$((FAILED + 1))
            fi
          }

          build_kernel "probability_ffi" "libtns_kernels"
          build_kernel "vector_ffi" "libtns_vectors"
          build_kernel "vector_full" "libtns_vector_full"
          build_kernel "batch_ops" "libtns_batch_ops"
          build_kernel "graph_ops" "libtns_graph_ops"

          echo ""
          echo "Built libraries:"
          ls -lh ../*.so ../*.dylib 2>/dev/null || echo "(none)"

          if [[ $FAILED -gt 0 ]]; then
            echo "::warning::${FAILED} Mojo kernel(s) failed to build"
          fi

      - name: Package
        shell: bash
        run: |
          mkdir -p release/${{ matrix.artifact }}

          cp tns-server* release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp -r public/ release/${{ matrix.artifact }}/ 2>/dev/null || true

          # Copy any Mojo libraries that were built
          cp libtns_kernels${{ matrix.so_ext }} release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp libtns_vectors${{ matrix.so_ext }} release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp libtns_vector_full${{ matrix.so_ext }} release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp libtns_batch_ops${{ matrix.so_ext }} release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp libtns_graph_ops${{ matrix.so_ext }} release/${{ matrix.artifact }}/ 2>/dev/null || true

          cp .env.example release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp startgame.sh release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp README.md release/${{ matrix.artifact }}/
          cp COMPILE.md release/${{ matrix.artifact }}/

          if [[ "${{ matrix.os }}" == windows* ]]; then
            cd release && 7z a ${{ matrix.artifact }}.zip ${{ matrix.artifact }}/
          else
            chmod +x release/${{ matrix.artifact }}/tns-server* 2>/dev/null || true
            chmod +x release/${{ matrix.artifact }}/startgame.sh 2>/dev/null || true
            cd release && tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}/
          fi

          echo ""
          echo "=== Package contents ==="
          ls -lh release/${{ matrix.artifact }}/

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f -name '*.tar.gz' -o -name '*.zip' | sort

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/**/*.{tar.gz,zip}
