name: Build & Release (Bun + Mojo FFI)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BUN_VERSION: "latest"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target_bun: bun-linux-x64
            artifact: tns-linux-x64
            so_ext: ".so"

          - os: ubuntu-22.04-arm
            target_bun: bun-linux-arm64
            artifact: tns-linux-arm64
            so_ext: ".so"

          - os: macos-latest
            target_bun: bun-darwin-arm64
            artifact: tns-macos-arm64
            so_ext: ".dylib"

          - os: macos-latest
            target_bun: bun-darwin-x64
            artifact: tns-macos-x64
            so_ext: ".dylib"

          - os: windows-latest
            target_bun: bun-windows-x64
            artifact: tns-windows-x64
            so_ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run lint

      - name: Build Bun binary
        shell: bash
        run: |
          OUT="tns-server${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          if [[ "${{ runner.arch }}" == "X64" && "${{ matrix.target_bun }}" == *"arm64"* ]] || \
             [[ "${{ runner.arch }}" == "ARM64" && "${{ matrix.target_bun }}" == *"x64"* ]]; then
            echo "Cross-compiling: ${{ matrix.target_bun }}"
            bun build --compile --target "${{ matrix.target_bun }}" --outfile "$OUT" src/index.ts
          else
            echo "Native build"
            bun build --compile --outfile "$OUT" src/index.ts
          fi

      - name: Install Mojo
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set +e
          if ! command -v mojo &>/dev/null; then
            curl -L https://magic.modular.com | bash 2>/dev/null
            export PATH="$HOME/.modular/bin:$HOME/.local/bin:$HOME/.magic/bin:$PATH"
            if command -v magic &>/dev/null; then
              magic install max 2>/dev/null || magic install mojo 2>/dev/null || true
            fi
          fi
          for p in "$HOME/.modular/bin/mojo" "$HOME/.local/bin/mojo" "$HOME/.magic/bin/mojo" "/usr/local/bin/mojo"; do
            if [[ -x "$p" ]]; then ln -sf "$p" /usr/local/bin/mojo 2>/dev/null; break; fi
          done
          if command -v mojo &>/dev/null; then echo "Mojo: $(mojo --version 2>&1 || echo 'ok')"; else echo "::warning::Mojo not found"; fi

      - name: Build Mojo Kernels
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if ! command -v mojo &>/dev/null; then
            echo "::warning::Skipping Mojo kernels"
            exit 0
          fi
          cd mojo
          for pair in \
            "probability_ffi libtns_kernels" \
            "vector_ffi libtns_vectors" \
            "vector_full libtns_vector_full" \
            "batch_ops libtns_batch_ops" \
            "graph_ops libtns_graph_ops"; do
            src=$(echo "$pair" | cut -d' ' -f1)
            name=$(echo "$pair" | cut -d' ' -f2)
            echo "Building ${name}${{ matrix.so_ext }} from ${src}.mojo..."
            if mojo build --emit shared-lib -O3 -o "../${name}${{ matrix.so_ext }}" "kernels/${src}.mojo" 2>&1; then
              echo "  OK"
            else
              echo "  FAILED"
            fi
          done
          echo "Libraries:"
          ls -lh ../*.so ../*.dylib 2>/dev/null || echo "  (none)"

      - name: Package
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p release/${{ matrix.artifact }}
          cp tns-server* release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp -r public/ release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp .env.example release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp startgame.sh release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp README.md release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp COMPILE.md release/${{ matrix.artifact }}/ 2>/dev/null || true

          SO_EXT="${{ matrix.so_ext }}"
          for lib in libtns_kernels libtns_vectors libtns_vector_full libtns_batch_ops libtns_graph_ops; do
            cp "${lib}${SO_EXT}" release/${{ matrix.artifact }}/ 2>/dev/null || true
          done

          chmod +x release/${{ matrix.artifact }}/tns-server* 2>/dev/null || true
          chmod +x release/${{ matrix.artifact }}/startgame.sh 2>/dev/null || true

          echo "Package contents:"
          ls -lh release/${{ matrix.artifact }}/

          cd release && tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}/

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/**/*.{tar.gz,zip}
