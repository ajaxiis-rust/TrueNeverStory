name: Build & Release (Bun + Mojo FFI)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BUN_VERSION: "latest"

jobs:
  build:
    strategy:
      matrix:
        include:
          # Linux x64
          - os: ubuntu-latest
            target_bun: bun-linux-x64
            artifact: tns-linux-x64
            so_ext: ".so"

          # Linux arm64
          - os: ubuntu-22.04-arm
            target_bun: bun-linux-arm64
            artifact: tns-linux-arm64
            so_ext: ".so"

          # macOS arm64
          - os: macos-latest
            target_bun: bun-darwin-arm64
            artifact: tns-macos-arm64
            so_ext: ".dylib"

          # macOS x64 (cross-compiled from arm64)
          - os: macos-latest
            target_bun: bun-darwin-x64
            artifact: tns-macos-x64
            so_ext: ".dylib"

          # Windows (только Bun, без Mojo)
          - os: windows-latest
            target_bun: bun-windows-x64
            artifact: tns-windows-x64
            so_ext: ""   # без Mojo

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      # === Bun ===
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Build Bun binary
        run: |
          OUT="tns-server${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          # Cross-compile: only when target arch differs from runner
          if [[ "${{ runner.arch }}" == "X64" && "${{ matrix.target_bun }}" == *"arm64"* ]] || \
             [[ "${{ runner.arch }}" == "ARM64" && "${{ matrix.target_bun }}" == *"x64"* ]]; then
            echo "Cross-compiling: ${{ matrix.target_bun }}"
            bun build --compile --target "${{ matrix.target_bun }}" --outfile "$OUT" src/index.ts
          else
            echo "Native build"
            bun build --compile --outfile "$OUT" src/index.ts
          fi

      # === Mojo FFI (только Linux + macOS) ===
      - name: Setup Mojo
        if: matrix.os != 'windows-latest'
        uses: fabasoad/setup-mojo-action@v3

      - name: Build Mojo Kernels
        if: matrix.os != 'windows-latest'
        run: |
          cd mojo
          
          # kernels
          mojo build --emit shared-lib -O3 \
            -o ../libtns_kernels${{ matrix.so_ext }} \
            kernels/probability_ffi.mojo

          # vectors
          mojo build --emit shared-lib -O3 \
            -o ../libtns_vectors${{ matrix.so_ext }} \
            kernels/vector_ffi.mojo

      - name: Package
        shell: bash
        run: |
          mkdir -p release/${{ matrix.artifact }}
          
          cp tns-server* release/${{ matrix.artifact }}/ 2>/dev/null || true
          
          # Копируем Mojo .so/.dylib
          if [[ -f libtns_kernels${{ matrix.so_ext }} ]]; then
            cp libtns_kernels${{ matrix.so_ext }} release/${{ matrix.artifact }}/
            cp libtns_vectors${{ matrix.so_ext }} release/${{ matrix.artifact }}/
          fi
          
          cp .env.example release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp startgame.sh release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp README.md release/${{ matrix.artifact }}/
          cp COMPILE.md release/${{ matrix.artifact }}/

          if [[ "${{ matrix.os }}" == windows* ]]; then
            cd release && 7z a ${{ matrix.artifact }}.zip ${{ matrix.artifact }}/
          else
            chmod +x release/${{ matrix.artifact }}/tns-server* 2>/dev/null || true
            cd release && tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}/
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/**/*.{tar.gz,zip}
