name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BUN_VERSION: "latest"
  ZIG_VERSION: "0.14.0"

jobs:
  build-ffi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Zig
        run: |
          curl -sL https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-linux-x86_64-${{ env.ZIG_VERSION }}.tar.xz | tar -xJ
          sudo mv zig-linux-x86_64-${{ env.ZIG_VERSION }} /usr/local/zig
          sudo ln -sf /usr/local/zig/zig /usr/local/bin/zig
          zig version

      - name: Build all platforms
        run: |
          cd mojo/kernels
          
          # Kernel source → output name mapping
          declare -A KERNEL_MAP=(
            ["probability_ffi"]="libtns_kernels"
            ["vector_ffi"]="libtns_vectors"
            ["vector_full"]="libtns_vector_full"
            ["batch_ops"]="libtns_batch_ops"
            ["graph_ops"]="libtns_graph_ops"
          )
          
          # Target → zig target, suffix
          declare -A TARGETS=(
            ["aarch64-linux"]="aarch64-linux-gnu|.so"
            ["x86_64-linux"]="x86_64-linux-gnu|.so"
            ["aarch64-linux-musl"]="aarch64-linux-musl|.so"
            ["x86_64-linux-musl"]="x86_64-linux-musl|.so"
            ["aarch64-macos"]="aarch64-macos|.dylib"
            ["x86_64-macos"]="x86_64-macos|.dylib"
            ["x86_64-windows"]="x86_64-windows-gnu|.dll"
            ["aarch64-windows"]="aarch64-windows-gnu|.dll"
            ["armv7-linux"]="arm-linux-gnueabihf|.so"
            ["riscv64-linux"]="riscv64-linux-gnu|.so"
          )
          
          for target in "${!TARGETS[@]}"; do
            IFS='|' read -r zig_target suffix <<< "${TARGETS[$target]}"
            echo "=== $target ($zig_target) ==="
            
            pkg_dir="dist/$target"
            mkdir -p "$pkg_dir"
            
            for src_name in "${!KERNEL_MAP[@]}"; do
              out_name="${KERNEL_MAP[$src_name]}"
              zig cc -target "$zig_target" -shared -fPIC -O3 \
                -o "$pkg_dir/${out_name}${suffix}" \
                "c/${src_name}.c" -lm 2>&1 | grep -v "warning" || true
            done
            
            # Copy TS bindings
            cp ../../src/lib/mojo-ffi.ts "$pkg_dir/"
            
            # Create tarball
            tar -czf "dist/tns-ffi-${target}.tar.gz" -C "$pkg_dir" .
            echo "  Built: tns-ffi-${target}.tar.gz ($(du -h dist/tns-ffi-${target}.tar.gz | cut -f1))"
          done
          
          echo ""
          echo "=== All packages ==="
          ls -lh dist/tns-ffi-*.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: ffi-packages
          path: mojo/kernels/dist/tns-ffi-*.tar.gz

  build-bun:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target_bun: bun-linux-x64
            artifact: tns-linux-x64

          - os: ubuntu-22.04-arm
            target_bun: bun-linux-arm64
            artifact: tns-linux-arm64

          - os: macos-latest
            target_bun: bun-darwin-arm64
            artifact: tns-macos-arm64

          - os: macos-latest
            target_bun: bun-darwin-x64
            artifact: tns-macos-x64

          - os: windows-latest
            target_bun: bun-windows-x64
            artifact: tns-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run lint

      - name: Build Bun binary
        shell: bash
        run: |
          OUT="tns-server${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          if [[ "${{ runner.arch }}" == "X64" && "${{ matrix.target_bun }}" == *"arm64"* ]] || \
             [[ "${{ runner.arch }}" == "ARM64" && "${{ matrix.target_bun }}" == *"x64"* ]]; then
            echo "Cross-compiling: ${{ matrix.target_bun }}"
            bun build --compile --target "${{ matrix.target_bun }}" --outfile "$OUT" src/index.ts
          else
            echo "Native build"
            bun build --compile --outfile "$OUT" src/index.ts
          fi

      - name: Package
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p release/${{ matrix.artifact }}
          cp tns-server* release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp -r public/ release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp .env.example release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp startgame.sh release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp README.md release/${{ matrix.artifact }}/ 2>/dev/null || true

          chmod +x release/${{ matrix.artifact }}/tns-server* 2>/dev/null || true
          chmod +x release/${{ matrix.artifact }}/startgame.sh 2>/dev/null || true

          echo "Package contents:"
          ls -lh release/${{ matrix.artifact }}/

          cd release && tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}/

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.*

  release:
    needs: [build-ffi, build-bun]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
