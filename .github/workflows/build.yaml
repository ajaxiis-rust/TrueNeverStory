name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BUN_VERSION: "latest"
  ZIG_VERSION: "0.14.0"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: tns-linux-x64
            zig_target: x86_64-linux-gnu
            suffix: .so
            bun_target: ""

          - os: ubuntu-latest
            artifact: tns-linux-arm64
            zig_target: aarch64-linux-gnu
            suffix: .so
            bun_target: bun-linux-arm64

          - os: macos-latest
            artifact: tns-macos-arm64
            zig_target: aarch64-macos
            suffix: .dylib
            bun_target: ""

          - os: macos-latest
            artifact: tns-macos-x64
            zig_target: x86_64-macos
            suffix: .dylib
            bun_target: bun-darwin-x64

          - os: windows-latest
            artifact: tns-windows-x64
            zig_target: x86_64-windows-gnu
            suffix: .dll
            bun_target: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Zig
        if: runner.os != 'Windows'
        run: |
          curl -sL https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-linux-x86_64-${{ env.ZIG_VERSION }}.tar.xz | tar -xJ
          sudo mv zig-linux-x86_64-${{ env.ZIG_VERSION }} /usr/local/zig
          sudo ln -sf /usr/local/zig/zig /usr/local/bin/zig
          zig version

      - name: Install Zig (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -sL https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-windows-x86_64-${{ env.ZIG_VERSION }}.zip -o zig.zip
          unzip -q zig.zip
          mv zig-windows-x86_64-${{ env.ZIG_VERSION }} /c/zig
          echo "/c/zig" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun install

      - name: Build FFI kernels
        shell: bash
        run: |
          cd mojo/kernels
          declare -A KERNEL_MAP=(
            ["probability_ffi"]="libtns_kernels"
            ["vector_ffi"]="libtns_vectors"
            ["vector_full"]="libtns_vector_full"
            ["batch_ops"]="libtns_batch_ops"
            ["graph_ops"]="libtns_graph_ops"
          )
          
          SUFFIX="${{ matrix.suffix }}"
          ZIG_TARGET="${{ matrix.zig_target }}"
          PKG_DIR="${{ github.workspace }}/release/${{ matrix.artifact }}"
          mkdir -p "$PKG_DIR"
          
          echo "Building FFI for $ZIG_TARGET"
          for src_name in "${!KERNEL_MAP[@]}"; do
            out_name="${KERNEL_MAP[$src_name]}"
            zig cc -target "$ZIG_TARGET" -shared -fPIC -O3 \
              -o "$PKG_DIR/${out_name}${SUFFIX}" \
              "c/${src_name}.c" -lm 2>&1 | grep -v "warning" || true
            echo "  ${out_name}${SUFFIX}"
          done

      - name: Build Bun binary
        shell: bash
        run: |
          OUT="release/${{ matrix.artifact }}/tns-server"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            OUT="${OUT}.exe"
          fi
          
          BUN_TARGET="${{ matrix.bun_target }}"
          if [[ -n "$BUN_TARGET" ]]; then
            echo "Cross-compiling: $BUN_TARGET"
            bun build --compile --target "$BUN_TARGET" --outfile "$OUT" src/index.ts
          else
            echo "Native build"
            bun build --compile --outfile "$OUT" src/index.ts
          fi

      - name: Package
        shell: bash
 run: |
          PKG_DIR="release/${{ matrix.artifact }}"
          cp -r public/ "$PKG_DIR/" 2>/dev/null || true
          cp .env.example "$PKG_DIR/" 2>/dev/null || true
          cp startgame.sh "$PKG_DIR/" 2>/dev/null || true
          cp README.md "$PKG_DIR/" 2>/dev/null || true
          chmod +x "$PKG_DIR"/tns-server* 2>/dev/null || true
          chmod +x "$PKG_DIR"/startgame.sh 2>/dev/null || true
          
          echo "=== Package contents ==="
          ls -lh "$PKG_DIR/"
          
          cd release
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a ${{ matrix.artifact }}.zip ${{ matrix.artifact }}/
          else
            tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}/
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
