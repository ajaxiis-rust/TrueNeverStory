<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueNeverStory — World Engine</title>
<link href="/static/fonts/fonts.css" rel="stylesheet">
<script src="/static/vendor/purify.min.js"></script>
<style>
:root {
  --black: #000000;
  --surface: #080808;
  --surface-raised: #111111;
  --surface-hover: #161616;
  --border: #1A1A1A;
  --border-visible: #272727;
  --border-strong: #353535;
  --text-disabled: #666666;
  --text-tertiary: #8E8E8E;
  --text-secondary: #BBBBBB;
  --text-primary: #E0E0E0;
  --text-display: #FFFFFF;
  --accent: #D71921;
  --accent-subtle: rgba(215,25,33,0.10);
  --accent-glow: rgba(215,25,33,0.20);
  --success: #4A9E5C;
  --success-subtle: rgba(74,158,92,0.12);
  --warning: #D4A843;
  --warning-subtle: rgba(212,168,67,0.12);
  --interactive: #5B9BF6;
  --interactive-subtle: rgba(91,155,246,0.10);
  --font-display: 'Doto', 'Space Mono', monospace;
  --font-body: 'Space Grotesk', 'DM Sans', system-ui, sans-serif;
  --font-mono: 'Space Mono', monospace;
  --radius-xs: 2px;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-pill: 999px;
  --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
  --ease-mech: cubic-bezier(0.0, 0.0, 0.2, 1);
  --dur-instant: 60ms;
  --dur-fast: 120ms;
  --dur-normal: 200ms;
  --dur-slow: 340ms;
  --sidebar-w: 380px;
  --topbar-h: 40px;
  --input-h: 96px;
  --tab-h: 36px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:var(--black);overflow:hidden}
body{height:100%;background:var(--black);font-family:var(--font-mono);font-size:12px;color:var(--text-primary);display:flex;flex-direction:column;overflow:hidden;user-select:none;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.app{position:relative;z-index:1;display:flex;height:100%;overflow:hidden}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;transition:padding-right var(--dur-slow) var(--ease-out);padding-right:0}
.app--sidebar-open .main-area{padding-right:var(--sidebar-w)}
.topbar{display:flex;align-items:center;gap:6px;padding:0 16px;height:var(--topbar-h);flex-shrink:0;border-bottom:1px solid var(--border);background:var(--black);z-index:10}
.topbar__brand{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-disabled);white-space:nowrap}
.topbar__brand span{color:var(--text-display);font-weight:700}
.topbar__sep{width:1px;height:14px;background:var(--border);flex-shrink:0}
.topbar__mem{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-tertiary);white-space:nowrap;cursor:default}
.topbar__mem-dot{width:5px;height:5px;border-radius:50%;background:var(--success);flex-shrink:0;transition:background var(--dur-fast)}
.topbar__spacer{flex:1}
.topbar__st{display:flex;align-items:center;gap:3px;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-disabled)}
.topbar__st::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0;background:var(--text-disabled);transition:background var(--dur-fast)}
.topbar__st--on{color:var(--text-secondary)}.topbar__st--on::before{background:var(--success)}
.topbar__st--off{color:var(--text-disabled)}
.topbar__clock{font-size:10px;color:var(--text-disabled);letter-spacing:0.06em;white-space:nowrap;font-variant-numeric:tabular-nums}
.topbar__btn{background:transparent;border:1px solid var(--border-visible);color:var(--text-tertiary);font-family:var(--font-mono);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;padding:4px 10px;cursor:pointer;border-radius:var(--radius-pill);transition:all var(--dur-fast);white-space:nowrap;display:flex;align-items:center;gap:4px;height:26px}
.topbar__btn:hover{border-color:var(--text-secondary);color:var(--text-primary)}
.topbar__btn--active{border-color:var(--text-display);color:var(--text-display);background:var(--surface-raised)}
.topbar__btn-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0}
.terminal{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 24px 16px 24px;scroll-behavior:smooth;min-height:0;display:flex;flex-direction:column;gap:0}
.terminal::-webkit-scrollbar{width:2px}
.terminal::-webkit-scrollbar-track{background:transparent}
.terminal::-webkit-scrollbar-thumb{background:var(--border-visible);border-radius:2px}
.msg{padding:3px 0;animation:msgIn 140ms var(--ease-out);line-height:1.6;word-break:break-word;white-space:pre-wrap}
.msg--dim{color:var(--text-secondary)}
.msg--accent{color:var(--accent)}
.msg--success{color:var(--success)}
.msg--narrative{color:var(--text-primary);font-family:var(--font-body);font-size:14px;line-height:1.7;padding:6px 0;letter-spacing:0.01em}
.msg--agent{color:var(--interactive);font-family:var(--font-mono);font-size:13px;line-height:1.6;padding:8px 12px;margin:4px 0;border-left:3px solid var(--interactive);background:rgba(91,155,246,0.06);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.msg--system{color:var(--text-secondary);font-size:11px;padding:2px 0}
.msg--error{color:var(--accent)}
.msg--error::before{content:'[ERR] ';font-size:9px;letter-spacing:0.1em}
@keyframes msgIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.input-area{flex-shrink:0;border-top:1px solid var(--border);background:var(--black)}
.input-area__main{display:flex;align-items:flex-start;gap:8px;padding:12px 20px;height:var(--input-h)}
.input-area__caret{color:var(--accent);font-size:14px;flex-shrink:0;transition:opacity var(--dur-fast);padding-top:4px}
.input-area__field{flex:1;background:transparent;border:none;outline:none;font-family:var(--font-mono);font-size:14px;color:var(--text-primary);caret-color:var(--text-display);letter-spacing:0.01em;padding:4px 0;min-height:60px;resize:none;overflow-y:auto;line-height:1.5}
.input-area__field::-webkit-scrollbar{width:2px}
.input-area__field::-webkit-scrollbar-thumb{background:var(--border-visible);border-radius:2px}
.input-area__field::placeholder{color:var(--text-disabled);font-style:italic}
.input-area__actions{display:flex;gap:4px;align-items:center}
.input-area__act{background:transparent;border:1px solid var(--border);color:var(--text-disabled);font-family:var(--font-mono);font-size:8px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;cursor:pointer;border-radius:var(--radius-pill);transition:all var(--dur-fast);white-space:nowrap}
.input-area__act:hover{border-color:var(--border-strong);color:var(--text-secondary)}
.quick-cmds{display:flex;gap:4px;padding:0 20px 8px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.quick-cmds::-webkit-scrollbar{display:none}
.qcmd{background:transparent;border:1px solid var(--border);color:var(--text-disabled);font-family:var(--font-mono);font-size:8px;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;cursor:pointer;border-radius:var(--radius-pill);transition:all var(--dur-fast);white-space:nowrap;flex-shrink:0}
.qcmd:hover{border-color:var(--border-strong);color:var(--text-secondary)}
.sidebar{position:fixed;right:0;top:0;height:100%;width:var(--sidebar-w);background:var(--surface);border-left:1px solid var(--border-visible);z-index:50;transform:translateX(100%);transition:transform var(--dur-slow) var(--ease-out);display:flex;flex-direction:column;overflow:hidden}
.app--sidebar-open .sidebar{transform:translateX(0)}
.sidebar__tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 8px;gap:0}
.sidebar__tab{font-family:var(--font-mono);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-disabled);padding:0 10px;height:var(--tab-h);display:flex;align-items:center;cursor:pointer;border-bottom:2px solid transparent;transition:all var(--dur-fast);white-space:nowrap;background:transparent;border-top:none;border-left:none;border-right:none}
.sidebar__tab:hover{color:var(--text-secondary)}
.sidebar__tab--active{color:var(--text-display);border-bottom-color:var(--text-display)}
.sidebar__body{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;display:flex;flex-direction:column;gap:8px}
.sidebar__body::-webkit-scrollbar{width:2px}
.sidebar__body::-webkit-scrollbar-track{background:transparent}
.sidebar__body::-webkit-scrollbar-thumb{background:var(--border-visible);border-radius:2px}
.panel{display:none;flex-direction:column;gap:8px}
.panel--active{display:flex}
.wcard{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;transition:border-color var(--dur-fast)}
.wcard:hover{border-color:var(--border-visible)}
.wcard__head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.wcard__title{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-secondary)}
.branch-tag{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.08em;color:var(--text-tertiary);text-transform:uppercase;padding:2px 8px;border:1px solid var(--border);border-radius:var(--radius-pill)}
.branch-tag__dot{width:4px;height:4px;border-radius:50%;background:var(--success)}
.thinking{font-family:var(--font-mono);font-size:10px;color:var(--text-disabled);display:flex;align-items:center;gap:5px;padding:3px 0;animation:msgIn 100ms var(--ease-out)}
.thinking__blks{display:inline-flex;gap:2px}
.thinking__b{width:3px;height:9px;background:var(--border-visible);border-radius:1px;transition:background 80ms}
.thinking__b--on{background:var(--text-display)}
.msg--streaming{position:relative}
.stream-cursor{display:inline-block;width:2px;height:1em;background:var(--text-display);margin-left:1px;vertical-align:text-bottom;animation:blink .6s step-end infinite}
@keyframes blink{50%{opacity:0}}

.session-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;animation:fadeIn 150ms var(--ease-out)}
.session-modal__box{background:var(--surface-raised);border:1px solid var(--border-visible);border-radius:var(--radius-lg);width:420px;max-height:70vh;display:flex;flex-direction:column;overflow:hidden}
.session-modal__head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.session-modal__title{font-family:var(--font-mono);font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-secondary)}
.session-modal__close{background:transparent;border:none;color:var(--text-disabled);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:4px}
.session-modal__close:hover{color:var(--text-primary)}
.session-modal__list{flex:1;overflow-y:auto;padding:8px}
.session-modal__item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;transition:all var(--dur-fast);margin-bottom:4px}
.session-modal__item:hover{border-color:var(--border-visible);background:var(--surface-hover)}
.session-modal__item-name{font-family:var(--font-mono);font-size:12px;color:var(--text-primary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-modal__item-msgs{font-family:var(--font-mono);font-size:11px;color:var(--text-disabled);flex-shrink:0;margin-left:10px}
.session-modal__empty{text-align:center;padding:30px;color:var(--text-disabled);font-size:12px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.toast{position:fixed;bottom:80px;right:24px;padding:10px 20px;border-radius:var(--radius-md);font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;z-index:200;animation:toastIn 200ms var(--ease-out)}
.toast--ok{background:var(--success);color:var(--black)}
.toast--err{background:var(--accent);color:var(--black)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.hamburger{display:none;background:transparent;border:none;color:var(--text-primary);font-size:18px;cursor:pointer;padding:4px;line-height:1;z-index:20}
.hamburger:hover{color:var(--text-display)}
.mobile-menu{display:none;position:fixed;top:var(--topbar-h);left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border-visible);z-index:15;padding:8px 16px;flex-direction:column;gap:4px}
.mobile-menu--open{display:flex}
.mobile-menu a,.mobile-menu button{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border);color:var(--text-secondary);font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 12px;border-radius:var(--radius-md);cursor:pointer;text-decoration:none;transition:all 120ms;width:100%;text-align:left}
.mobile-menu a:hover,.mobile-menu button:hover{border-color:var(--text-secondary);color:var(--text-primary)}
.mobile-menu a span,.mobile-menu button span{width:6px;height:6px;border-radius:50%;flex-shrink:0}

@media(max-width:768px){
  :root{--sidebar-w:100vw;--topbar-h:44px;--input-h:80px}
  .hamburger{display:block;font-size:20px;padding:6px}
  .topbar__btn:not(#newGameBtn):not(#toggleSidebarBtn){display:none}
  .topbar__sep{display:none}
  .topbar__spacer{display:none}
  .topbar{gap:6px;padding:0 12px;height:var(--topbar-h)}
  .topbar__brand{font-size:9px;letter-spacing:0.1em}
  .topbar__brand span{font-size:10px}
  .topbar__mem{display:none}
  .topbar__st{display:none}
  .topbar__clock{display:none}
  .topbar__btn{font-size:8px;padding:4px 10px;height:26px}
  .topbar__btn-dot{width:4px;height:4px}
  .topbar__btn span[data-i18n]{display:none}
  .topbar__btn span[data-i18n="uiNew"]{display:inline}
  .terminal{padding:16px}
  .msg{font-size:14px;line-height:1.7}
  .msg--narrative{font-size:16px;line-height:1.8;padding:8px 0}
  .msg--system{font-size:12px}
  .msg--dim{font-size:13px}
  .input-area__main{padding:10px 16px;height:var(--input-h);align-items:flex-start}
  .input-area__field{font-size:16px;min-height:48px;line-height:1.5}
  .input-area__caret{font-size:16px;padding-top:2px}
  .input-area__actions{gap:6px}
  .input-area__act{font-size:9px;padding:5px 10px}
  .quick-cmds{padding:0 16px 8px;gap:6px}
  .qcmd{font-size:9px;padding:5px 10px}
  .sidebar{width:100vw}
  .session-modal__box{width:calc(100vw - 32px)}
  .toast{bottom:90px;right:16px;left:16px;font-size:12px;padding:12px 20px}
  .mobile-menu{padding:10px 16px;gap:6px}
  .mobile-menu a,.mobile-menu button{font-size:12px;padding:10px 14px}
}
@media(max-width:480px){
  :root{--input-h:72px}
  .topbar__brand{display:none}
  .topbar__btn span[data-i18n="uiAgents"],
  .topbar__btn span[data-i18n="uiModels"]{display:none}
  .terminal{padding:12px}
  .msg{font-size:15px}
  .msg--narrative{font-size:17px}
  .input-area__field{font-size:17px}
  .input-area__main{padding:8px 12px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main-area" id="mainArea">
    <div class="topbar" id="topbar">
      <button class="hamburger" id="hamburgerBtn">&#9776;</button>
      <div class="topbar__brand"><span>TrueNeverStory</span></div>
      <div class="topbar__sep"></div>
      <div class="topbar__mem" id="memoryPill" title="Memory Health">
        <span class="topbar__mem-dot" id="memoryDot"></span>
        <span id="memoryPillText">MEM --</span>
      </div>
      <div class="branch-tag" id="branchTag"><span class="branch-tag__dot"></span><span id="branchName">MAIN</span></div>
      <div class="topbar__spacer"></div>
      <span class="topbar__st topbar__st--off" id="apiStatusDot">API</span>
      <span class="topbar__st topbar__st--off" id="wsStatusDot">WS</span>
      <span class="topbar__clock" id="headerClock">--:--:--</span>
      <button class="topbar__btn" id="newGameBtn"><span class="topbar__btn-dot" style="background:var(--interactive)"></span><span data-i18n="uiNew">NEW</span></button>
      <a class="topbar__btn" href="/providers" style="text-decoration:none"><span class="topbar__btn-dot" style="background:var(--warning)"></span><span data-i18n="uiProviders">PROVIDERS</span></a>
      <a class="topbar__btn" href="/worlds" style="text-decoration:none">WORLDS</a>
      <a class="topbar__btn" href="/agents" style="text-decoration:none"><span class="topbar__btn-dot" style="background:var(--success)"></span><span data-i18n="uiAgents">AGENTS</span></a>
      <a class="topbar__btn" href="/models" style="text-decoration:none"><span class="topbar__btn-dot" style="background:var(--interactive)"></span><span data-i18n="uiModels">MODELS</span></a>
      <a class="topbar__btn" href="/settings" style="text-decoration:none"><span class="topbar__btn-dot" style="background:var(--success)"></span><span data-i18n="uiConfig">CONFIG</span></a>
      <button class="topbar__btn" id="toggleSidebarBtn"><span class="topbar__btn-dot"></span><span data-i18n="uiServer">SERVER</span></button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="/worlds"><span style="background:var(--interactive)"></span>WORLDS</a>
      <a href="/providers"><span style="background:var(--warning)"></span><span data-i18n="uiProviders">PROVIDERS</span></a>
      <a href="/agents"><span style="background:var(--success)"></span><span data-i18n="uiAgents">AGENTS</span></a>
      <a href="/models"><span style="background:var(--interactive)"></span><span data-i18n="uiModels">MODELS</span></a>
      <a href="/settings"><span style="background:var(--success)"></span><span data-i18n="uiConfig">CONFIG</span></a>
      <a href="/graph.html"><span style="background:var(--interactive)"></span><span data-i18n="uiGraph">GRAPH</span></a>
      <button id="mobileSidebarBtn"><span style="background:var(--text-disabled)"></span><span data-i18n="uiServer">SERVER</span></button>
    </div>
    <div class="terminal" id="terminalOutput"></div>
    <div class="input-area">
      <div class="quick-cmds" id="quickCmds">
        <button class="qcmd" data-cmd="/status" data-i18n="uiQcmdStatus">status</button>
        <button class="qcmd" data-cmd="/look" data-i18n="uiQcmdLook">look</button>
        <button class="qcmd" data-cmd="/quests" data-i18n="uiQcmdQuests">quests</button>
        <a class="qcmd" href="/graph.html" data-i18n="uiGraph" style="text-decoration:none">graph</a>
        <button class="qcmd" data-cmd="/help" data-i18n="uiQcmdHelp">help</button>
      </div>
      <div class="input-area__main">
        <span class="input-area__caret">▸</span>
        <textarea class="input-area__field" id="terminalInput" data-i18n-placeholder="uiPlaceholder" placeholder="type a command or ask anything..." rows="1" autofocus></textarea>
        <div class="input-area__actions">
          <button class="input-area__act" id="clearBtn" title="Clear terminal"><span data-i18n="uiClr">CLR</span></button>
          <button class="input-area__act" id="saveBtn" title="Save session to markdown"><span data-i18n="uiSaveSession">SAVE</span></button>
          <button class="input-area__act" id="loadBtn" title="Load saved session"><span data-i18n="uiLoadSession">LOAD</span></button>
        </div>
      </div>
    </div>
  </div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar__tabs" id="sidebarTabs">
      <button class="sidebar__tab sidebar__tab--active" data-tab="world" data-i18n="uiTabWorld">World</button>
      <button class="sidebar__tab" data-tab="character" data-i18n="uiTabChar">Char</button>
      <button class="sidebar__tab" data-tab="system" data-i18n="uiTabSys">Sys</button>
    </div>
    <div class="sidebar__body" id="sidebarBody">
      <div class="panel panel--active" id="panelWorld">
        <div class="wcard" id="wGraphStats">
          <div class="wcard__head"><span class="wcard__title" data-i18n="uiGraphOverview">Graph Overview</span></div>
          <div style="margin-top:10px;font-family:var(--font-mono);font-size:11px;color:var(--text-secondary)">
            Nodes: <span id="wNodes">--</span> | Edges: <span id="wEdges">--</span>
          </div>
        </div>
      </div>
      <div class="panel" id="panelCharacter">
        <div class="wcard">
          <div class="wcard__head"><span class="wcard__title" data-i18n="uiCurrentChar">Current Character</span></div>
          <div id="cCharInfo" style="margin-top:6px;font-size:11px;color:var(--text-disabled)" data-i18n="uiNoChar">No character selected</div>
        </div>
      </div>
      <div class="panel" id="panelSystem">
        <div class="wcard">
          <div class="wcard__head"><span class="wcard__title" data-i18n="uiServiceStatus">Service Status</span></div>
          <div style="margin-top:8px;font-size:10px;color:var(--text-secondary)">
            API: <span id="sApiStatus">CHECKING</span><br>
            WS: <span id="sWsStatus">CHECKING</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const EN={uiNew:"NEW",uiProviders:"PROVIDERS",uiAgents:"AGENTS",uiModels:"MODELS",uiConfig:"CONFIG",uiGraph:"GRAPH",uiServer:"SERVER",uiQcmdStatus:"status",uiQcmdLook:"look",uiQcmdQuests:"quests",uiQcmdHelp:"help",uiPlaceholder:"type a command or ask anything...",uiClr:"CLR",uiSaveSession:"SAVE",uiLoadSession:"LOAD",uiTabWorld:"World",uiTabChar:"Char",uiTabSys:"Sys",uiGraphOverview:"Graph Overview",uiCurrentChar:"Current Character",uiNoChar:"No character selected",uiServiceStatus:"Service Status",uiProcessing:"PROCESSING"};
const RU={...EN,uiNew:"НОВАЯ",uiProviders:"ПРОВАЙДЕРЫ",uiAgents:"АГЕНТЫ",uiModels:"МОДЕЛИ",uiConfig:"НАСТРОЙКИ",uiGraph:"ГРАФ",uiServer:"СЕРВЕР",uiQcmdStatus:"статус",uiQcmdLook:"осмотреть",uiQcmdQuests:"квесты",uiQcmdHelp:"помощь",uiPlaceholder:"введи команду или спроси что угодно...",uiClr:"ОЧИСТ",uiSaveSession:"СОХР",uiLoadSession:"ЗАГР",uiTabWorld:"Мир",uiTabChar:"Перс",uiTabSys:"Сист",uiGraphOverview:"Обзор графа",uiCurrentChar:"Текущий персонаж",uiNoChar:"Персонаж не выбран",uiServiceStatus:"Статус сервиса",uiProcessing:"ОБРАБОТКА"};

const FR={...EN,uiNew:"NOUVEAU",uiProviders:"FOURNISSEURS",uiAgents:"AGENTS",uiModels:"MODÈLES",uiConfig:"CONFIG",uiServer:"SERVEUR",uiQcmdStatus:"statut",uiQcmdLook:"regarder",uiQcmdQuests:"quêtes",uiQcmdHelp:"aide",uiPlaceholder:"entrez une commande...",uiClr:"EFFAC",uiSaveSession:"SAUV",uiLoadSession:"CHARG",uiTabWorld:"Monde",uiTabChar:"Pers",uiTabSys:"Sys",uiGraphOverview:"Aperçu du graphe",uiCurrentChar:"Personnage actif",uiNoChar:"Aucun personnage",uiServiceStatus:"État du service",uiProcessing:"TRAITEMENT"};
const ES={...EN,uiNew:"NUEVO",uiProviders:"PROVEEDORES",uiAgents:"AGENTES",uiModels:"MODELOS",uiConfig:"CONFIG",uiServer:"SERVIDOR",uiQcmdStatus:"estado",uiQcmdLook:"mirar",uiQcmdQuests:"misiones",uiQcmdHelp:"ayuda",uiPlaceholder:"escribe un comando...",uiClr:"LIMPI",uiSaveSession:"GUARD",uiLoadSession:"CARGAR",uiTabWorld:"Mundo",uiTabChar:"Pers",uiTabSys:"Sys",uiGraphOverview:"Vista del grafo",uiCurrentChar:"Personaje actual",uiNoChar:"Sin personaje",uiServiceStatus:"Estado del servicio",uiProcessing:"PROCESANDO"};
const JA={...EN,uiNew:"新規",uiProviders:"プロバイダー",uiAgents:"エージェント",uiModels:"モデル",uiConfig:"設定",uiServer:"サーバー",uiQcmdStatus:"状態",uiQcmdLook:"見る",uiQcmdQuests:"クエスト",uiQcmdHelp:"ヘルプ",uiPlaceholder:"コマンドを入力...",uiClr:"消去",uiSaveSession:"保存",uiLoadSession:"読込",uiTabWorld:"世界",uiTabChar:"キャラ",uiTabSys:"システム",uiGraphOverview:"グラフ概要",uiCurrentChar:"現在のキャラ",uiNoChar:"キャラ未選択",uiServiceStatus:"サービス状態",uiProcessing:"処理中"};
const ZH={...EN,uiNew:"新建",uiProviders:"供应商",uiAgents:"智能体",uiModels:"模型",uiConfig:"配置",uiServer:"服务器",uiQcmdStatus:"状态",uiQcmdLook:"查看",uiQcmdQuests:"任务",uiQcmdHelp:"帮助",uiPlaceholder:"输入命令...",uiClr:"清除",uiSaveSession:"保存",uiLoadSession:"加载",uiTabWorld:"世界",uiTabChar:"角色",uiTabSys:"系统",uiGraphOverview:"图概览",uiCurrentChar:"当前角色",uiNoChar:"未选择角色",uiServiceStatus:"服务状态",uiProcessing:"处理中"};
function applyLang(lang){document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(lang[k])el.textContent=lang[k]});document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{const k=el.getAttribute('data-i18n-placeholder');if(lang[k])el.placeholder=lang[k]});}
</script>
<script>
(function(){
  const outputEl = document.getElementById('terminalOutput');
  const inputEl = document.getElementById('terminalInput');
  const headerClock = document.getElementById('headerClock');
  const apiStatusDot = document.getElementById('apiStatusDot');
  const wsStatusDot = document.getElementById('wsStatusDot');
  const sidebar = document.getElementById('sidebar');
  const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
  const API_BASE = '/api';

  fetch(API_BASE + '/settings', { credentials: 'include' }).then(r => r.json()).then(s => {
    const langs = { en: EN, ru: RU, de: DE, fr: FR, es: ES, ja: JA, zh: ZH };
    window._uiLang = langs[s.language] || EN;
    applyLang(window._uiLang);
  }).catch(() => {});

  let commandHistory = [];
  let historyIndex = -1;
  let thinkingElement = null;
  let thinkingInterval = null;
  let chatWs = null;

  function now() {
    return new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function addMsg(text, cls) {
    cls = cls || '';
    const el = document.createElement('div');
    el.className = 'msg ' + cls;
    el.textContent = text;
    outputEl.appendChild(el);
    outputEl.scrollTop = outputEl.scrollHeight;
    return el;
  }

  function addStreamMsg() {
    const el = document.createElement('div');
    el.className = 'msg msg--narrative msg--streaming';
    el.innerHTML = '<span class="stream-cursor"></span>';
    outputEl.appendChild(el);
    outputEl.scrollTop = outputEl.scrollHeight;
    return el;
  }

  function showThinking() {
    if (thinkingElement) removeThinking();
    const el = document.createElement('div');
    el.className = 'thinking';
    el.innerHTML = '<span>[</span><span class="thinking__blks"><span class="thinking__b thinking__b--on"></span><span class="thinking__b"></span><span class="thinking__b"></span><span class="thinking__b"></span></span><span> ' + (window._uiLang && window._uiLang.uiProcessing || 'PROCESSING') + ']</span>';
    outputEl.appendChild(el);
    thinkingElement = el;
    const blocks = el.querySelectorAll('.thinking__b');
    let idx = 0;
    thinkingInterval = setInterval(function() {
      blocks.forEach(function(b) { b.classList.remove('thinking__b--on'); });
      blocks[idx].classList.add('thinking__b--on');
      idx = (idx + 1) % blocks.length;
    }, 160);
    outputEl.scrollTop = outputEl.scrollHeight;
  }

  function removeThinking() {
    if (thinkingInterval) clearInterval(thinkingInterval);
    if (thinkingElement && thinkingElement.parentNode) thinkingElement.remove();
    thinkingElement = null; thinkingInterval = null;
  }

  async function apiFetch(path, options = {}) {
    const res = await fetch(API_BASE + path, { credentials: 'include', ...options });
    return res.json();
  }

  async function sendMessage(text) {
    showThinking();
    let msgEl = null;
    try {
      const response = await fetch(API_BASE + '/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ content: text }),
      });

      if (!response.ok) {
        removeThinking();
        addMsg('Connection error: HTTP ' + response.status, 'msg--error');
        return;
      }

      const reader = response.body?.getReader();
      if (!reader) {
        removeThinking();
        addMsg('No response body', 'msg--error');
        return;
      }

      const decoder = new TextDecoder();
      let buffer = '';
      let isAgent = false;
      removeThinking();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const event = JSON.parse(data);
            if (event.type === 'chunk' && event.content) {
              if (!msgEl) {
                msgEl = addStreamMsg();
                msgEl.textContent = '';
              }
              msgEl.textContent += event.content;
              outputEl.scrollTop = outputEl.scrollHeight;
            } else if (event.type === 'done') {
              if (msgEl) {
                msgEl.classList.remove('msg--streaming');
                if (event.agent_id) {
                  msgEl.classList.remove('msg--narrative');
                  msgEl.classList.add('msg--agent');
                }
              }
            } else if (event.type === 'error') {
              addMsg(event.error || 'Unknown error', 'msg--error');
            }
          } catch {}
        }
      }
    } catch (e) {
      removeThinking();
      addMsg('Connection error: ' + e.message, 'msg--error');
    }
  }

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;
      commandHistory.push(text);
      historyIndex = commandHistory.length;
      addMsg('> ' + text, 'msg--dim');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendMessage(text);
    } else if (e.key === 'ArrowUp' && !e.shiftKey) {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        inputEl.value = commandHistory[historyIndex] || '';
      }
    } else if (e.key === 'ArrowDown' && !e.shiftKey) {
      e.preventDefault();
      if (historyIndex < commandHistory.length - 1) {
        historyIndex++;
        inputEl.value = commandHistory[historyIndex] || '';
      } else {
        historyIndex = commandHistory.length;
        inputEl.value = '';
      }
    }
  });

  inputEl.addEventListener('input', function() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 60) + 'px';
  });

  document.querySelectorAll('.qcmd').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const cmd = btn.dataset.cmd;
      if (cmd) {
        inputEl.value = cmd;
        inputEl.focus();
      }
    });
  });

  toggleSidebarBtn.addEventListener('click', function() {
    sidebar.classList.toggle('sidebar--visible');
    var mm = document.getElementById('mobileMenu');
    if (mm) mm.classList.remove('mobile-menu--open');
  });

  var hamburgerBtn = document.getElementById('hamburgerBtn');
  var mobileMenu = document.getElementById('mobileMenu');
  if (hamburgerBtn && mobileMenu) {
    hamburgerBtn.addEventListener('click', function() {
      mobileMenu.classList.toggle('mobile-menu--open');
    });
    var mobileSidebarBtn = document.getElementById('mobileSidebarBtn');
    if (mobileSidebarBtn) {
      mobileSidebarBtn.addEventListener('click', function() {
        mobileMenu.classList.remove('mobile-menu--open');
        sidebar.classList.toggle('sidebar--visible');
      });
    }
    mobileMenu.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() { mobileMenu.classList.remove('mobile-menu--open'); });
    });
    document.addEventListener('click', function(e) {
      if (!mobileMenu.contains(e.target) && e.target !== hamburgerBtn) {
        mobileMenu.classList.remove('mobile-menu--open');
      }
    });
  }

  document.getElementById('clearBtn').addEventListener('click', function() {
    outputEl.innerHTML = '';
  });

  // New session button — redirect to worlds page for character creation
  document.getElementById('newGameBtn').addEventListener('click', function() {
    window.location.href = '/worlds';
  });

  // Clock
  setInterval(function() {
    headerClock.textContent = now();
  }, 1000);

  // API health check
  async function checkHealth() {
    try {
      await apiFetch('/health');
      apiStatusDot.className = 'topbar__st topbar__st--on';
    } catch {
      apiStatusDot.className = 'topbar__st topbar__st--off';
    }
  }
  checkHealth();
  setInterval(checkHealth, 30000);

  // Load chat history or show welcome
  async function loadHistory() {
    try {
      // Check if a character is set
      const session = await apiFetch('/chat/session');
      if (session.active_character) {
        addMsg('TrueNeverStory v0.12.0 — TypeScript + Mojo', 'msg--accent');
        addMsg('Character: ' + session.active_character + ' | Location: ' + session.current_location, 'msg--system');
        addMsg('Type a command or describe an action to continue.', 'msg--dim');
        addMsg('', '');
      } else {
        addMsg('TrueNeverStory v0.12.0 — TypeScript + Mojo', 'msg--accent');
        addMsg('No character active. Click NEW to create one.', 'msg--dim');
        addMsg('', '');
      }

      const history = await apiFetch('/chat/history?limit=50');
      if (history && history.length > 0) {
        history.forEach(function(entry) {
          if (entry.user) addMsg('> ' + entry.user, 'msg--dim');
          if (entry.assistant) addMsg(entry.assistant, 'msg--narrative');
        });
        outputEl.scrollTop = outputEl.scrollHeight;
        return;
      }
    } catch (e) {}
  }
  loadHistory();

  // Save session button
  document.getElementById('saveBtn').addEventListener('click', async function() {
    const btn = this;
    const msgs = outputEl.querySelectorAll('.msg');
    const data = [];
    for (const el of msgs) {
      const text = el.textContent.trim();
      if (!text) continue;
      if (el.classList.contains('msg--dim')) {
        data.push({ role: 'user', content: text.replace(/^>\s*/, '') });
      } else if (el.classList.contains('msg--narrative')) {
        data.push({ role: 'narrative', content: text });
      } else if (el.classList.contains('msg--system')) {
        data.push({ role: 'system', content: text });
      } else if (el.classList.contains('msg--accent') || el.classList.contains('msg--error') || el.classList.contains('msg--success')) {
        data.push({ role: 'system', content: text });
      } else {
        data.push({ role: 'assistant', content: text });
      }
    }
    if (!data.length) { toast('Nothing to save', false); return; }
    var origText = btn.textContent;
    btn.textContent = 'SAVING...';
    btn.disabled = true;
    try {
      const res = await fetch(API_BASE + '/sessions/export', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: data }),
        credentials: 'include',
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.error || 'Failed');
      btn.textContent = 'SAVED';
      toast('Saved: ' + result.filename, true);
      setTimeout(function() { btn.textContent = origText; btn.disabled = false; }, 2000);
    } catch (e) {
      btn.textContent = origText;
      btn.disabled = false;
      toast('Save failed: ' + e.message, false);
    }
  });

  function toast(msg, ok) {
    const el = document.createElement('div');
    el.className = 'toast ' + (ok ? 'toast--ok' : 'toast--err');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 3000);
  }

  // Load session button
  document.getElementById('loadBtn').addEventListener('click', async function() {
    const modal = document.createElement('div');
    modal.className = 'session-modal';
    modal.innerHTML = '<div class="session-modal__box">' +
      '<div class="session-modal__head"><span class="session-modal__title">Saved Sessions</span><button class="session-modal__close">&times;</button></div>' +
      '<div class="session-modal__list"><div class="session-modal__empty">Loading...</div></div>' +
      '</div>';
    document.body.appendChild(modal);

    modal.querySelector('.session-modal__close').addEventListener('click', function() { modal.remove(); });
    modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });

    try {
      const res = await fetch(API_BASE + '/sessions/exports', { credentials: 'include' });
      const data = await res.json();
      const list = modal.querySelector('.session-modal__list');

      if (!data.files || !data.files.length) {
        list.innerHTML = '<div class="session-modal__empty">No saved sessions</div>';
        return;
      }

      list.innerHTML = '';
      data.files.forEach(function(f) {
        var item = document.createElement('div');
        item.className = 'session-modal__item';
        var name = f.filename.replace(/\.md$/, '').replace(/_/g, ' ');
        item.innerHTML = '<span class="session-modal__item-name">' + esc(name) + '</span>';
        item.addEventListener('click', async function() {
          modal.remove();
          await loadSessionFile(f.filename);
        });
        list.appendChild(item);
      });
    } catch (e) {
      modal.querySelector('.session-modal__list').innerHTML = '<div class="session-modal__empty">Failed to load list</div>';
    }
  });

  async function loadSessionFile(filename) {
    try {
      const res = await fetch(API_BASE + '/sessions/exports/' + encodeURIComponent(filename), { credentials: 'include' });
      if (!res.ok) throw new Error('Not found');
      const data = await res.json();

      outputEl.innerHTML = '';
      addMsg('--- Loaded: ' + filename + ' ---', 'msg--system');
      addMsg('', '');

      (data.messages || []).forEach(function(m) {
        if (m.role === 'user') {
          addMsg('> ' + m.content, 'msg--dim');
        } else if (m.role === 'narrative') {
          addMsg(m.content, 'msg--narrative');
        } else if (m.role === 'system') {
          addMsg(m.content, 'msg--system');
        } else {
          addMsg(m.content, '');
        }
      });

      addMsg('', '');
      addMsg('--- End of session ---', 'msg--system');
      toast('Loaded: ' + filename, true);
    } catch (e) {
      toast('Load failed: ' + e.message, false);
    }
  }

  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
})();
</script>
</body>
</html>
