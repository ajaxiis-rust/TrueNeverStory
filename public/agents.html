<style>
:root{--font-body:'Space Grotesk',system-ui,sans-serif;--font-mono:'Space Mono',monospace;--radius-md:8px;--radius-lg:12px;--radius-pill:999px;--ease-out:cubic-bezier(.22,.61,.36,1);--dur-fast:120ms;--dur-normal:200ms;--dur-slow:340ms}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:var(--black);overflow:hidden}
body{height:100%;background:var(--black);font-family:var(--font-mono);font-size:14px;color:var(--text-primary);display:flex;flex-direction:column;overflow:hidden;user-select:none}

.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:48px;border-bottom:1px solid var(--border);flex-shrink:0}
.topbar__brand{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-disabled)}
.topbar__brand span{color:var(--text-display);font-weight:700}
.topbar__sep{width:1px;height:18px;background:var(--border)}
.topbar__title{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary)}
.topbar__spacer{flex:1}
.topbar__btn{background:transparent;border:1px solid var(--border-visible);color:var(--text-tertiary);font-family:var(--font-mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:6px 16px;cursor:pointer;border-radius:var(--radius-pill);transition:all var(--dur-fast);text-decoration:none;display:inline-flex;align-items:center}
.topbar__btn:hover{border-color:var(--text-secondary);color:var(--text-primary)}

.content{flex:1;overflow-y:auto;padding:20px 24px}
.content::-webkit-scrollbar{width:2px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--border-visible);border-radius:2px}

/* Agent tabs */
.agent-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.agent-tabs::-webkit-scrollbar{display:none}
.agent-tab{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-disabled);padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;transition:all var(--dur-fast);background:transparent;border-top:none;border-left:none;border-right:none;white-space:nowrap;flex-shrink:0}
.agent-tab:hover{color:var(--text-secondary)}
.agent-tab--active{color:var(--text-display);border-bottom-color:var(--text-display)}
.agent-tab__dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px}
.agent-tab__dot--on{background:var(--success)}
.agent-tab__dot--off{background:var(--accent)}

/* Agent panel */
.agent-panel{display:none}
.agent-panel--active{display:block}

/* Forms */
.form{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;flex-direction:column;gap:10px}
.form__row{display:flex;gap:10px;align-items:end}
.form__field{display:flex;flex-direction:column;gap:3px;flex:1}
.form__field--sm{max-width:150px}
.form__field--full{flex:0 0 100%}
.form__label{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-disabled)}
.form__input,.form__textarea,.form__select{background:var(--surface);border:1px solid var(--border-visible);border-radius:var(--radius-md);padding:9px 12px;font-family:var(--font-mono);font-size:13px;color:var(--text-primary);outline:none;transition:border-color var(--dur-fast);width:100%}
.form__input:focus,.form__textarea:focus{border-color:var(--text-secondary)}
.form__input::placeholder,.form__textarea::placeholder{color:var(--text-disabled)}
.form__textarea{min-height:120px;resize:vertical;line-height:1.5;font-size:12px}
.form__select{appearance:none;cursor:pointer}
.form__checkbox{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);cursor:pointer}
.form__checkbox input{width:16px;height:16px;accent-color:var(--interactive)}

/* Section */
.section{margin-bottom:20px}
.section__title{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-secondary);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section__title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Buttons */
.btn{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;padding:7px 16px;border-radius:var(--radius-pill);cursor:pointer;transition:all var(--dur-fast);border:1px solid var(--border-visible);background:transparent;color:var(--text-secondary)}
.btn:hover{border-color:var(--text-secondary);color:var(--text-primary)}
.btn--primary{background:var(--text-display);color:var(--black);border-color:var(--text-display)}
.btn--primary:hover{opacity:.9}
.btn--danger{border-color:var(--accent);color:var(--accent)}
.btn--danger:hover{background:var(--accent);color:var(--black)}
.btn--sm{padding:5px 12px;font-size:11px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:12px 24px;border-radius:var(--radius-md);font-family:var(--font-mono);font-size:13px;letter-spacing:.06em;z-index:100;animation:toastIn 200ms var(--ease-out)}
.toast--ok{background:var(--success);color:var(--black)}
.toast--err{background:var(--accent);color:var(--black)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Info card */
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;margin-bottom:12px}
.info-card__title{font-family:var(--font-body);font-size:15px;color:var(--text-display);font-weight:500;margin-bottom:4px}
.info-card__desc{font-size:12px;color:var(--text-tertiary);line-height:1.4}

/* Status badges */
.badge{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:2px 8px;border-radius:var(--radius-pill);border:1px solid var(--border)}
.badge--on{border-color:var(--success);color:var(--success)}
.badge--off{border-color:var(--accent);color:var(--accent)}

/* Help Modal */
.help-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;animation:fadeIn 150ms var(--ease-out)}
.help-modal__box{background:var(--surface-raised);border:1px solid var(--border-visible);border-radius:var(--radius-lg);width:680px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.help-modal__head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.help-modal__title{font-family:var(--font-mono);font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-secondary)}
.help-modal__close{background:transparent;border:none;color:var(--text-disabled);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:4px}
.help-modal__close:hover{color:var(--text-primary)}
.help-modal__body{flex:1;overflow-y:auto;padding:16px 20px;font-size:12px;color:var(--text-secondary);line-height:1.6}
.help-modal__body h3{font-family:var(--font-body);font-size:14px;color:var(--text-display);font-weight:500;margin:16px 0 6px}
.help-modal__body h3:first-child{margin-top:0}
.help-modal__body table{width:100%;border-collapse:collapse;margin:6px 0}
.help-modal__body th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-disabled);padding:4px 8px;border-bottom:1px solid var(--border)}
.help-modal__body td{padding:4px 8px;border-bottom:1px solid var(--border);font-size:11px}
.help-modal__body td:first-child{color:var(--interactive);font-family:var(--font-mono);white-space:nowrap}
.help-modal__body code{background:var(--surface);padding:1px 5px;border-radius:3px;font-size:11px;color:var(--interactive)}
.help-modal__body pre{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--text-tertiary);margin:6px 0;overflow-x:auto}
.help-tag{display:inline-block;font-size:10px;padding:2px 6px;margin:2px;background:var(--interactive-subtle);border:1px solid rgba(91,155,246,.2);border-radius:4px;color:var(--interactive);font-family:var(--font-mono)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@media(max-width:768px){
  .page{padding:12px}
  .page__title{font-size:18px;margin-bottom:16px}
  .back{font-size:10px;padding:6px 12px}
  .section{padding:14px}
  .section__title{font-size:12px}
  .field{flex-direction:column;align-items:stretch}
  .field__input,.field__select,.field__textarea{width:100%;font-size:13px}
  .field__textarea{min-height:80px}
  .save-btn{width:100%;font-size:11px;padding:10px}
  .agent-card{padding:12px}
  .agent-list{gap:8px}
}

function t(key) {
  if (remoteTranslations[key] !== undefined) return remoteTranslations[key];
  return I18N[lang]?.[key] ?? I18N.en[key] ?? key;
}
function agentName(id) {
  if (remoteAgentNames[id] !== undefined) return remoteAgentNames[id];
  return AGENT_NAMES[lang]?.[id] ?? AGENT_NAMES.en[id] ?? id;
}
function agentDesc(id) {
  if (remoteAgentDescs[id] !== undefined) return remoteAgentDescs[id];
  return AGENT_DESCS[lang]?.[id] ?? AGENT_DESCS.en[id] ?? '';
}

async function loadTranslations(langCode) {
  try {
    const [transRes, namesRes, descsRes] = await Promise.all([
      fetch(`${API}/i18n/translations/${langCode}/agents`, { credentials: 'include' }).catch(() => null),
      fetch(`${API}/i18n/translations/${langCode}/agent_names`, { credentials: 'include' }).catch(() => null),
      fetch(`${API}/i18n/translations/${langCode}/agent_descs`, { credentials: 'include' }).catch(() => null),
    ]);
    if (transRes && transRes.ok) {
      const data = await transRes.json();
      remoteTranslations = data.translations || {};
    }
    if (namesRes && namesRes.ok) {
      const data = await namesRes.json();
      remoteAgentNames = data.translations || {};
    }
    if (descsRes && descsRes.ok) {
      const data = await descsRes.json();
      remoteAgentDescs = data.translations || {};
    }
  } catch (e) {
    console.warn('Failed to load remote translations, using inline fallback', e);
  }
}

function toast(msg, ok) {
  const el = document.createElement('div');
  el.className = 'toast ' + (ok ? 'toast--ok' : 'toast--err');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Load Data ──
async function loadData() {
  try {
    const settingsRes = await fetch(API + '/settings', { credentials: 'include' }).catch(() => null);
    if (settingsRes && settingsRes.ok) {
      const settingsData = await settingsRes.json();
      lang = settingsData.language || 'en';
      globalSettings = settingsData;
    }
  } catch {}

  // Load remote translations for current language
  await loadTranslations(lang);

  document.title = 'TrueNeverStory — ' + t('title');
  const titleEl = document.querySelector('.topbar__title');
  if (titleEl) titleEl.textContent = t('title');
  const provBtn = document.querySelector('.topbar__btn[href="/providers"]');
  if (provBtn) provBtn.textContent = t('providers');
  const modelBtn = document.querySelector('.topbar__btn[href="/models"]');
  if (modelBtn) modelBtn.textContent = t('models');
  const backBtn = document.querySelector('.topbar__btn[href="/"]');
  if (backBtn) backBtn.textContent = t('back');

  try {
    const [agentsRes, providersRes] = await Promise.all([
      fetch(API + '/agents', { credentials: 'include' }).catch(() => ({ ok: false })),
      fetch(API + '/agents/providers/options', { credentials: 'include' }).catch(() => ({ ok: false, json: () => ({ providers: [] }) })),
    ]);

    if (agentsRes.ok) {
      const agentsData = await agentsRes.json();
      agents = agentsData.agents || [];
    }

    if (providersRes.ok) {
      const providersData = await providersRes.json();
      providerOptions = providersData.providers || [];
    }
  } catch (e) {
    toast(t('failed') + e.message, false);
  }

  renderTabs();
  if (agents.length > 0 && !activeAgent) {
    selectAgent(agents[0].id);
  } else if (activeAgent) {
    renderPanel(activeAgent);
  }
}

  const defaultModel = globalSettings?.llmModel || '—';
  const defaultUrl = globalSettings?.llmBaseUrl || '—';

  // Quick assign buttons
  const quickDiv = document.getElementById('quickAssign');
  if (providerOptions.length > 0) {
    quickDiv.innerHTML = providerOptions.map(p => {
      const modelBtns = (p.models || []).map(m =>
        `<button class="btn btn--sm" onclick="assignAll('${esc(p.id)}','${esc(m)}')" title="Assign all to ${esc(p.name)} / ${esc(m)}">${esc(m)}</button>`
      ).join('');
      return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--text-secondary);min-width:80px;font-weight:500">${esc(p.name)}</span>
        ${modelBtns || '<span style="font-size:11px;color:var(--text-disabled)">no models</span>'}
      </div>`;
    }).join('');

  tabs.innerHTML = `

    <button class="agent-tab ${a.id === activeAgent ? 'agent-tab--active' : ''}" onclick="selectAgent('${esc(a.id)}')">

function selectAgent(id) {

}

function onProviderChange(agentId) {
  const provId = document.getElementById('agent-provider').value;
  const models = providerOptions.find(p => p.id === provId)?.models || [];
  const select = document.getElementById('agent-model');
  select.innerHTML = `<option value="">${t('default')}</option>` +
    models.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('');
}

// ── Save Settings ──
async function saveSettings(id) {
  const agent = agents.find(a => a.id === id);
  if (!agent) return;

  const data = {
    enabled: document.getElementById('agent-enabled').checked,
    providerId: document.getElementById('agent-provider').value,
    modelId: document.getElementById('agent-model').value,
    temperature: parseFloat(document.getElementById('agent-temp').value) || 0.7,
    maxTokens: parseInt(document.getElementById('agent-maxTokens').value) || 4096,
    priority: parseInt(document.getElementById('agent-priority').value) || 5,
  };

  try {
    const res = await fetch(API + '/agents/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
      credentials: 'include',
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || 'Failed');
    toast(t('saved'), true);
    loadData();
  } catch (e) {
    toast(t('saveFailed') + e.message, false);
  }
}

// ── Save Prompts ──
async function savePrompts(id) {
  const data = {
    systemPrompt: document.getElementById('prompt-system').value,
    userTemplate: document.getElementById('prompt-template').value,
    outputFormat: document.getElementById('prompt-output').value,
  };

  try {
    const res = await fetch(API + '/agents/' + id + '/prompts', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
      credentials: 'include',
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || 'Failed');
    toast(t('promptsSaved'), true);
  } catch (e) {
    toast(t('saveFailed') + e.message, false);
  }
}

async function assignAll(providerId, modelId) {
  if (!confirm(`Assign ALL agents to ${providerId} / ${modelId}?`)) return;
  const results = [];
  for (const agent of agents) {
    try {
      const res = await fetch(API + '/agents/' + agent.id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ providerId, modelId }),
        credentials: 'include',
      });
      results.push({ agentId: agent.id, ok: res.ok });
    } catch {
      results.push({ agentId: agent.id, ok: false });
    }
  }
  const success = results.filter(r => r.ok).length;
  toast(`Assigned ${success}/${results.length} agents`, success === results.length);
  loadData();
}

// ── Reset Agent ──
async function resetAgent(id) {
  if (!confirm(t('confirmReset')(id))) return;
  try {
    const res = await fetch(API + '/agents/' + id + '/reset', { method: 'POST', credentials: 'include' });
    if (!res.ok) throw new Error('Failed');
    toast(t('resetDone'), true);
    loadData();
  } catch (e) {
    toast(t('resetFailed') + e.message, false);
  }
}

    ['world_context', 'World context', 'Контекст мира', 'Welthilfe', 'Contexte du monde', 'Contexto del mundo', '世界コンテキスト', '世界上下文'],
  ];

  const agentVars = {
    narrator: { vars: ['world_name','time','location','character','role','rules','timeline','memories','facts','npcs','history'], desc: { en:'Primary storyteller', ru:'Главный рассказчик', de:'Hauptgeschichtenerzähler', fr:'Narrateur principal', es:'Narrador principal', ja:'メインストーリーテラー', zh:'主要叙事者' }},
    director: { vars: ['narrative','beat'], desc: { en:'Story beat injection', ru:'Инъекция сюжетных битов', de:'Handlungsbeat-Injektion', fr:'Injection de battements', es:'Inyección de momentos', ja:'ストーリービート注入', zh:'故事节拍注入' }},
    scene: { vars: ['character','origin','destination','rules','events'], desc: { en:'Scene transitions', ru:'Переходы между сценами', de:'Szenenübergänge', fr:'Transitions de scène', es:'Transiciones de escena', ja:'シーン遷移', zh:'场景过渡' }},
    npc: { vars: ['npc_name','npc_personality','player','location','relationship','events','line'], desc: { en:'NPC dialogue', ru:'Диалог NPC', de:'NPC-Dialog', fr:'Dialogue PNJ', es:'Diálogo NPC', ja:'NPCダイアログ', zh:'NPC对话' }},
    chronicler: { vars: ['events','timeline'], desc: { en:'Timeline management', ru:'Управление таймлайном', de:'Zeitachsenverwaltung', fr:'Gestion de la chronologie', es:'Gestión de cronología', ja:'タイムライン管理', zh:'时间线管理' }},
    'story-planner': { vars: ['world_state','characters','events','quests'], desc: { en:'Story arc planning', ru:'Планирование арок', de:'Handlungsplanung', fr:'Planification narrative', es:'Planificación argumental', ja:'ストーリー計画', zh:'故事弧线规划' }},
    'social-sim': { vars: ['characters','relationships','context'], desc: { en:'Social dynamics', ru:'Социальная динамика', de:'Soziale Dynamik', fr:'Dynamique sociale', es:'Dinámica social', ja:'ソーシャルダイナミクス', zh:'社交动态' }},
    villain: { vars: ['villain','world_state','recent_actions'], desc: { en:'Antagonist management', ru:'Управление антагонистами', de:'Antagonisten-Management', fr:'Gestion des antagonistes', es:'Gestión de antagonistas', ja:'敵対者管理', zh:'反派管理' }},
    researcher: { vars: ['task','world_context'], desc: { en:'Fact-checking', ru:'Проверка фактов', de:'Faktencheck', fr:'Vérification', es:'Verificación', ja:'事実確認', zh:'事实核查' }},
    historian: { vars: ['query','world_history','relevant_events','world_rules'], desc: { en:'World history', ru:'История мира', de:'Weltgeschichte', fr:'Histoire du monde', es:'Historia del mundo', ja:'世界の歴史', zh:'世界历史' }},
    cartographer: { vars: ['query','locations','current_location'], desc: { en:'Maps and geography', ru:'Карты и география', de:'Karten und Geographie', fr:'Cartes et géographie', es:'Mapas y geografía', ja:'地図と地理', zh:'地图与地理' }},
    merchant: { vars: ['query','inventory','world_economy'], desc: { en:'Trading and pricing', ru:'Торговля и цены', fr:'Commerce et prix', de:'Handel und Preise', es:'Comercio y precios', ja:'交易と価格', zh:'贸易与定价' }},
    'quest-giver': { vars: ['query','world_state','active_quests','nearby_npcs','player_level'], desc: { en:'Quest generation', ru:'Генерация квестов', de:'Quest-Generierung', fr:'Génération de quêtes', es:'Generación de misiones', ja:'クエスト生成', zh:'任务生成' }},
    lorekeeper: { vars: ['query','world_facts','magic_system','races'], desc: { en:'World lore and canon', ru:'Лор и канон мира', de:'Welten-Mythos und Kanon', fr:'Mythologie et canon', es:'Leyenda y canon', ja:'世界の伝承と正典', zh:'世界传说与正典' }},
  };

  const langIdx = { en:0, ru:1, de:2, fr:3, es:4, ja:5, zh:6 };
  const li = langIdx[lang] ?? 0;

  let html = '<h3>' + t('helpGlobalVars') + '</h3><table><thead><tr><th>Variable</th><th>' + (lang==='ru'?'Описание':lang==='de'?'Beschreibung':lang==='fr'?'Description':lang==='es'?'Descripción':lang==='ja'?'説明':lang==='zh'?'描述':'Description') + '</th></tr></thead><tbody>';
  for (const v of globalVars) {
    html += '<tr><td>{' + v[0] + '}</td><td>' + esc(v[li+1]) + '</td></tr>';
  }
  html += '</tbody></table>';

  html += '<h3>' + t('helpAgents') + '</h3>';
  for (const [id, info] of Object.entries(agentVars)) {
    const name = agentName(id);
    const desc = info.desc[lang] || info.desc.en;
    html += '<div style="margin:8px 0;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px">';
    html += '<div style="font-weight:500;color:var(--text-display);margin-bottom:4px">' + esc(name) + ' <code style="font-size:10px;color:var(--text-disabled)">' + id + '</code></div>';
    html += '<div style="font-size:11px;color:var(--text-tertiary);margin-bottom:6px">' + esc(desc) + '</div>';
    html += '<div>' + info.vars.map(v => '<span class="help-tag">' + v + '</span>').join('') + '</div>';
    html += '</div>';
  }

  html += '<h3>' + t('helpTemperature') + '</h3><table><thead><tr><th>0.1-0.3</th><th>0.4-0.6</th><th>0.7-0.8</th></tr></thead><tbody><tr>';
  html += '<td>' + (lang==='ru'?'Точный, детерминированный':lang==='de'?'Fokussiert':lang==='fr'?'Focalisé':lang==='es'?'Enfocado':lang==='ja'?'集中':lang==='zh'?'专注':'Focused, deterministic') + '</td>';
  html += '<td>' + (lang==='ru'?'Балансированный':lang==='de'?'Ausgewogen':lang==='fr'?'Équilibré':lang==='es'?'Equilibrado':lang==='ja'?'バランス':lang==='zh'?'平衡':'Balanced') + '</td>';
  html += '<td>' + (lang==='ru'?'Креативный':lang==='de'?'Kreativ':lang==='fr'?'Créatif':lang==='es'?'Creativo':lang==='ja'?'創造的':lang==='zh'?'创意':'Creative') + '</td>';
  html += '</tr></tbody></table>';

  html += '<h3>' + t('helpAgentChat') + '</h3><pre>@narrator ' + (lang==='ru'?'опиши атмосферу леса':lang==='de'?'beschreibe die Waldatmosphäre':lang==='fr'?'décris l\'atmosphère de la forêt':lang==='es'?'describe la atmósfera del bosque':lang==='ja'?'森の雰囲気を描写':lang==='zh'?'描述森林氛围':'describe the forest atmosphere') + '\n@director ' + (lang==='ru'?'предложи сюжетный поворот':lang==='de'?'schlage einen Plot-Twist vor':lang==='fr'?'suggère un rebondissement':lang==='es'?'sugiere un giro argumental':lang==='ja'?'プロットの展開を提案':lang==='zh'?'建议剧情转折':'suggest a plot twist') + '</pre>';

  const modal = document.createElement('div');
  modal.className = 'help-modal';
  modal.innerHTML = '<div class="help-modal__box"><div class="help-modal__head"><span class="help-modal__title">' + t('helpTitle') + '</span><button class="help-modal__close" onclick="this.closest(\'.help-modal\').remove()">&times;</button></div><div class="help-modal__body">' + html + '</div></div>';
  document.body.appendChild(modal);
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
}

// ── Init ──
loadData();
</script>
</body>
</html>
